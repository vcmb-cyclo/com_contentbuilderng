COM_CONTENTBUILDERNG_EXTENSION_USAGE_CONTENT="Aktivieren Sie das Plugin und verwenden Sie es dann über das Joomla-Content-Rendering, generierte Artikel, die ContentBuilder-Detailausgabe oder die dokumentierte Plugin-Syntax, sofern vorhanden."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_LISTACTION="Aktivieren Sie das Plugin und wählen Sie es dann in der Listenaktionskonfiguration der Ansicht aus, um Aktionen auf ausgewählte Einträge anzuwenden."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_SUBMIT="Aktivieren Sie das Plugin und passen Sie es als Entwicklerbeispiel für Vor- und Nachverarbeitung einer Übermittlung an."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_THEME="Aktivieren Sie das Plugin und wählen Sie es dann in der Theme-Plugin-Einstellung der Ansicht aus, um Template-Beispiele, CSS und JavaScript bereitzustellen."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_VALIDATION="Aktivieren Sie das Plugin und weisen Sie es dann einer Feldvalidierungsregel in der Feldkonfiguration der Ansicht zu."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_VALIDATION_DATE_IS_VALID="Aktivieren Sie das Plugin und fügen Sie \"date_is_valid\" zur Feldeinstellung „Wähle Validierung(en)“ in der Feldkonfiguration hinzu, um einen gültigen Datumswert zu verlangen."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_VALIDATION_DATE_NOT_BEFORE="Aktivieren Sie das Plugin und fügen Sie \"date_not_before\" zur Feldeinstellung „Wähle Validierung(en)“ hinzu, und legen Sie ein zweites Datumsfeld namens <Feldname>_later an (z. B. \"start_date_later\" für ein Feld namens \"start_date\"). Die Validierung schlägt fehl, wenn das Datum des „_later“-Felds vor dem Datum dieses Felds liegt."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_VALIDATION_EMAIL="Aktivieren Sie das Plugin und fügen Sie \"email\" zur Feldeinstellung „Wähle Validierung(en)“ in der Feldkonfiguration hinzu, um eine gültige E-Mail-Adresse zu verlangen."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_VALIDATION_EQUAL="Aktivieren Sie das Plugin und fügen Sie \"equal\" zur Feldeinstellung „Wähle Validierung(en)“ hinzu, und legen Sie ein zweites Feld namens <Feldname>_repeat an (z. B. \"password_repeat\" für ein Feld namens \"password\"). Die Validierung schlägt fehl, wenn die beiden Feldwerte nicht übereinstimmen."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_VALIDATION_NOTEMPTY="Aktivieren Sie das Plugin und fügen Sie \"notempty\" zur Feldeinstellung „Wähle Validierung(en)“ in der Feldkonfiguration hinzu, um einen nicht leeren Wert zu verlangen."
COM_CONTENTBUILDERNG_EXTENSION_USAGE_VERIFY="Aktivieren und konfigurieren Sie das Plugin und wählen Sie es dann in den Berechtigungen der Ansicht als Verifizierungsplugin für Registrierung oder Profil aus."
