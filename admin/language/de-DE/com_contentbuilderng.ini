COM_CONTENTBUILDERNG_API_CONTENT_PLUGIN_METHOD="Inhalt"
COM_CONTENTBUILDERNG_API_CONTENT_PLUGIN_STATS_DESC="Syntax des CB-Stats-Inhaltsplugins für Joomla-Artikel und HTML-Inhalte. Erlaubte output-Werte: total, table, form_name, sum. id=ViewID verwenden. output=total gibt nur eine Zahl zurück, output=form_name gibt den Titel/Namen der Ansicht zurück, output=table eine statische HTML-Tabelle, output=sum gibt die gewichtete Summe der numerischen Feldwerte zurück (erfordert field=Feldname; gibt 0 zurück, wenn die Werte nicht numerisch sind). Mit field=Feldname werden Summen gruppiert, mit filter[field]=Feldname filter[value]='150 km' werden Summen gefiltert. Führende und nachgestellte Leerzeichen werden sowohl in angeforderten als auch in gespeicherten Werten ignoriert. Verwenden Sie * als Platzhalter für eine beliebige Zeichenfolge, zum Beispiel filter[value]='200 km*'. Trennen Sie Alternativen mit |, zum Beispiel filter[value]='200 km* | 300 km*'. Werte mit Leerzeichen in Anführungszeichen setzen. Ungültige output-Werte geben \"Invalid statistics request.\" zurück; mit debug=1 werden die erlaubten Werte aufgelistet. Wenn die STATS-Berechtigung verweigert wird, gibt das Plugin \"Statistics unavailable\" zurück; mit debug=1 gibt es \"CBStats DEBUG: field not allowed for API/Stats.\" zurück."
COM_CONTENTBUILDERNG_API_UPDATE_DESC="Einen Datensatz per JSON-Payload aktualisieren: {\"fields\": {\"ElementName\": \"value\"}}."
