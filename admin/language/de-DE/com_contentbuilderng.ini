COM_CONTENTBUILDERNG_HELP_VIEWS_TITLE="Ansichten"
COM_CONTENTBUILDERNG_HELP_VIEWS_INTRO="Eine Ansicht steuert den gesamten Lebenszyklus Ihrer Datensätze: Listenansicht, Detailseite, Bearbeitungsformular, Berechtigungen und Workflow."
COM_CONTENTBUILDERNG_HELP_VIEWS_POINT_1="Erstellen Sie pro Anwendungsfall eine eigene Ansicht (öffentliche Erfassung, Back-Office-Liste, Detailseite, interner Workflow)."
COM_CONTENTBUILDERNG_HELP_VIEWS_POINT_2="Konfigurieren Sie zuerst Quelle und Berechtigungen, dann Felder, Sortierung, Paginierung und Filter."
COM_CONTENTBUILDERNG_HELP_VIEWS_POINT_3="Testen Sie mit mindestens zwei Benutzerrollen vor der Veröffentlichung."
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_WHAT="Wofür dient dieser Screen?"
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_WHAT_TEXT="Dieser Screen listet alle Ansichten Ihrer Website. Jede Ansicht legt fest, wie ein Formular oder Datenspeicher im Frontend dargestellt wird (Liste, Detail, Bearbeitung) und welche Zugriffsregeln für die Datensätze gelten."
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_DESIGN="Konzeption einer Ansicht"
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_DESIGN_TEXT="Erstellen Sie pro klar definiertem Anwendungsfall eine Ansicht: öffentliche Erfassung, Back-Office-Liste, Detailseite, interner Workflow. Ein eindeutiger Name und eine klar definierte Datenquelle verhindern schwer wartbare Universalansichten."
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_CONFIG="Empfohlene Konfigurationsreihenfolge"
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_CONFIG_TEXT="Beginnen Sie mit der Datenquelle und den Berechtigungen (anzeigen, erstellen, bearbeiten, veröffentlichen), dann Felder (Listeneinschluss, Suche, verlinkbar, bearbeitbar), Sortierung, Paginierung, Filter, Theme-Plugins und erweiterte Optionen."
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_CONFIG_WARN="Berechtigungen zuletzt zu konfigurieren ist eine häufige Fehlerquelle — richten Sie diese zuerst ein."
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_PROD="Veröffentlichung"
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_PROD_TEXT="Bevor Sie eine Ansicht öffentlich zugänglich machen: Testen Sie die Abläufe mit mindestens zwei verschiedenen Benutzerrollen, prüfen Sie Validierungsmeldungen und Fehlerfeedback, bestätigen Sie das Verhalten von Massenaktionen und Veröffentlichung, und testen Sie die Performance bei großen Listen."
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_LIST="Steuerelemente der Ansichtsliste"
COM_CONTENTBUILDERNG_HELP_VIEWS_SEC_LIST_TEXT="Bewegen Sie den Mauszeiger über eine Spaltenüberschrift, um ihre Beschreibung anzuzeigen; sortierbare Überschriften bleiben anklickbar. Die Spalte Debug steht direkt vor Veröffentlicht. Ein grünes Käfer-Symbol zeigt den aktiven Debug-Modus an und kann zum Deaktivieren angeklickt werden. Mit Aktionen > Debug oder Aktionen > Kein Debug ändern Sie alle ausgewählten Ansichten gleichzeitig. Dasselbe grüne Käfer-Symbol kennzeichnet den aktiven Debug-Modus im Bearbeitungsbildschirm einer Ansicht."
COM_CONTENTBUILDERNG_HELP_BACK_TO_VIEWS="Zurück zu Ansichten"
COM_CONTENTBUILDERNG_HELP_VIEW_TITLE="Ansicht konfigurieren"
COM_CONTENTBUILDERNG_HELP_VIEW_INTRO="Dieser Screen konfiguriert eine einzelne Ansicht: Datenquelle, angezeigte Felder, Zugriffsberechtigungen und Formularverhalten."
COM_CONTENTBUILDERNG_HELP_VIEW_POINT_1="Beginnen Sie mit der Datenquelle und dem Anzeigebereich (Frontend, Backend oder beides)."
COM_CONTENTBUILDERNG_HELP_VIEW_POINT_2="Legen Sie die Berechtigungen fest, bevor Sie Felder konfigurieren."
COM_CONTENTBUILDERNG_HELP_VIEW_POINT_3="Testen Sie mit mindestens zwei Benutzerrollen vor der Veröffentlichung."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_WHAT="Wofür dient dieser Screen?"
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_WHAT_TEXT="Dieser Screen ermöglicht die vollständige Konfiguration einer Ansicht: Datenquelle, jeden Konfigurations-Tab (Liste, Detail, Bearbeitung, Berechtigungen, erweiterte Optionen) und den Veröffentlichungsstatus."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_SOURCE="Datenquelle"
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_SOURCE_TEXT="Verknüpfen Sie die Ansicht mit einem BreezingForms-Formular oder einem ContentBuilder NG-Datenspeicher. Ohne gültige Quelle können keine Felder konfiguriert werden und die Ansicht funktioniert nicht."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_SOURCE_WARN="Ohne gültige Datenquelle funktioniert die Ansicht nicht."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_TABS="Konfigurations-Tabs"
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_TABS_TEXT="Die Ansicht wird über mehrere Tabs konfiguriert: Quelle (Datenverknüpfung), Liste (Spalten, Filter, Sortierung, Paginierung), Detail (Datensatz-Anzeigetemplate), Bearbeitung (Formulartemplate), Berechtigungen (Zugriffsrechte pro Gruppe), Optionen (Status, Bewertung, Sprache, erweiterte Filter)."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_DEBUG="Debug-Modus der Ansicht"
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_DEBUG_TEXT="Der Debug-Modus stellt Diagnoseinformationen für diese Ansicht bereit, ohne den globalen Debug-Modus von Joomla zu benötigen. Er gilt für die Frontend-Ausgaben Liste, Detail und Bearbeiten der Ansicht."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_DEBUG_ENABLE="Aktivieren Sie Debug rechts neben Veröffentlicht im Tab Ansicht, speichern Sie die Ansicht und wählen Sie anschließend im Tab Debug die anzuzeigenden Informationen. Ein DEBUG-Badge bestätigt den aktiven Modus im Frontend."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_DEBUG_FRONTEND="Das Diagnosefeld im Frontend ist standardmäßig eingeklappt. Abhängig von den gewählten Optionen zeigt es die aktuelle Datensatz-ID, ermittelte Berechtigungen, aktive Filter und während der aktuellen Anfrage erzeugte CBNG-Protokolleinträge."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_DEBUG_WARN="Deaktivieren Sie diesen Modus nach der Diagnose. Die Debug-Informationen werden Benutzern angezeigt, die auf die Ansicht zugreifen können, und können interne IDs, Berechtigungen, Filter oder technische Protokollmeldungen offenlegen."
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_PROD="Vor der Veröffentlichung"
COM_CONTENTBUILDERNG_HELP_VIEW_SEC_PROD_TEXT="Prüfen Sie die Berechtigungen für jede betroffene Gruppe, testen Sie Listenansicht, Detailseite und Bearbeitungsformular, und stellen Sie sicher, dass die serverseitige Validierung für alle Felder korrekt funktioniert."
COM_CONTENTBUILDERNG_HELP_STORAGES_TITLE="Datenspeicher"
COM_CONTENTBUILDERNG_HELP_STORAGES_INTRO="Ein Datenspeicher repräsentiert die Datenstruktur eines Formulars: seine Spalten, Felder und Datensätze."
COM_CONTENTBUILDERNG_HELP_STORAGES_POINT_1="Erstellen Sie pro zu persistierendem Formular einen Datenspeicher."
COM_CONTENTBUILDERNG_HELP_STORAGES_POINT_2="Synchronisieren Sie die Tabelle nach jedem Hinzufügen oder Entfernen von Feldern."
COM_CONTENTBUILDERNG_HELP_STORAGES_POINT_3="Veröffentlichungsstatus und Sortierung dienen nur der Anzeige."
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_WHAT="Wofür dient dieser Screen?"
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_WHAT_TEXT="Dieser Screen listet alle Datenspeicher Ihrer Website. Jeder Datenspeicher entspricht einer Datenbanktabelle, die die Formulareingaben Ihrer Besucher speichert."
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_WHEN="Wann einen Datenspeicher anlegen?"
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_WHEN_TEXT="Erstellen Sie einen neuen Datenspeicher, wenn Sie eine neue Datenstruktur persistieren möchten — z. B. für ein Kontakt-, Anmelde- oder Bestellformular. In den meisten Fällen genügt ein Datenspeicher pro Formular."
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_SYNC="Feldsynchronisation"
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_SYNC_TEXT="Wenn Sie die Struktur eines Formulars ändern (Felder hinzufügen, entfernen oder umbenennen), wird die Datenbanktabelle nicht automatisch aktualisiert. Verwenden Sie die Aktion Synchronisieren, um die Tabellenstruktur mit der aktuellen Formulardefinition abzugleichen."
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_SYNC_WARN="Eine fehlende Synchronisation kann zu Speicherfehlern oder fehlenden Daten führen."
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_STATE="Veröffentlichungsstatus und Sortierung"
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_STATE_ON="Veröffentlicht: der Datenspeicher ist aktiv und kann Daten empfangen."
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_STATE_OFF="Unveröffentlicht: der Datenspeicher ist deaktiviert; neue Datensätze werden abgelehnt."
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_STATE_ORDER="Die Anzeigereihenfolge hat keine funktionale Auswirkung — sie dient nur dazu, die Liste bei vielen Datenspeichern übersichtlich zu halten."
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_LIST="Spalten der Speicherliste"
COM_CONTENTBUILDERNG_HELP_STORAGES_SEC_LIST_TEXT="Bewegen Sie den Mauszeiger über eine Spaltenüberschrift, um eine Beschreibung ihres Inhalts anzuzeigen. Sortierbare Überschriften bleiben anklickbar und ändern die Reihenfolge der Liste."
COM_CONTENTBUILDERNG_HELP_BACK_TO_STORAGES="Zurück zu Datenspeichern"
COM_CONTENTBUILDERNG_HELP_STORAGE_TITLE="Datenspeicher"
COM_CONTENTBUILDERNG_HELP_STORAGE_INTRO="Dieser Screen konfiguriert einen einzelnen Datenspeicher: seine SQL-Tabelle, Felder und Wartungsoperationen (Erstellung, Synchronisation, CSV-Import)."
COM_CONTENTBUILDERNG_HELP_STORAGE_POINT_1="Wählen Sie von Beginn an einen stabilen SQL-Namen — spätere Umbenennungen erfordern eine manuelle Migration."
COM_CONTENTBUILDERNG_HELP_STORAGE_POINT_2="Führen Sie Datatable Sync nach jeder Strukturänderung aus."
COM_CONTENTBUILDERNG_HELP_STORAGE_POINT_3="Testen Sie einen CSV-Import immer zuerst mit einer kleinen Stichprobe."
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_PARAMS="Hauptparameter"
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_PARAMS_TEXT="Der technische Name identifiziert die SQL-Tabelle (vermeiden Sie häufige Änderungen). Der Titel ist die in der Administration angezeigte Bezeichnung. Der interne Modus erstellt und verwaltet die Tabelle automatisch; der externe Modus verbindet sich mit einer bestehenden Tabelle. Der Veröffentlichungsstatus aktiviert oder deaktiviert den Datenspeicher."
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_TOOLBAR="Werkzeugleiste"
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_TOOLBAR_TEXT="Speichern erstellt oder benennt die SQL-Tabelle im internen Modus automatisch um. Datatable Sync gleicht die Tabellenstruktur mit den deklarierten Feldern ab — nach jeder Strukturänderung ausführen. Felder löschen entfernt die ausgewählten Felder aus der Liste."
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_FIELDS="Feldverwaltung"
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_FIELDS_TEXT="Wählen Sie von Beginn an einen stabilen SQL-Namen — spätere Umbenennungen erfordern eine manuelle Migration. Definieren Sie einen klaren Bezeichner für die Administration. Überprüfen Sie vor der Veröffentlichung, ob die Feldtypen den tatsächlichen Daten entsprechen."
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_CSV="CSV-Import"
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_CSV_TEXT="Prüfen Sie Trennzeichen und Zeichenkodierung vor jedem Import. Die Option Datensätze löschen löscht vorhandene Daten vor dem Import — mit Vorsicht verwenden. Testen Sie immer zuerst mit einer kleinen Stichprobe."
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_ERRORS="Häufige Fehler"
COM_CONTENTBUILDERNG_HELP_STORAGE_SEC_ERRORS_TEXT="Tabelle umbenennen: SQL-Backup vor jeder Änderung erstellen. Felder/Tabelle inkonsistent: Datatable Sync nach jeder Strukturänderung ausführen. Unvollständiger Import: CSV-Trennzeichen, Zeichenkodierung und erwartete Spalten prüfen. Namenskonflikte: vorhandene Spaltennamen nicht mit einem anderen Typ wiederverwenden."
COM_CONTENTBUILDERNG_HELP_ABOUT_TITLE="Hilfe - Ueber"
COM_CONTENTBUILDERNG_HELP_ABOUT_INTRO="ContentBuilder NG ist eine Low-Code-Datenanwendung fuer Joomla. Damit modellieren Sie Daten, bauen Formulare sowie Listen/Detailansichten und steuern Record-Workflows per Konfiguration."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_1="Kernarchitektur: Datenspeicher definieren physische Tabellen/Felder, waehrend Ansichten Geschaeftslogik und Ausgabeverhalten definieren."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_2="Ausgabearten der Ansichten: Konfigurieren Sie Erstellen/Bearbeiten-Formulare, Listenansichten, Detailansichten und den Modus letzter Eintrag aus einer Konfiguration."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_3="Berechtigungen und Steuerung: Regeln Sie Ansehen/Erstellen/Bearbeiten/Loeschen/Veroeffentlichen je Benutzergruppe mit Besitzeroptionen und Statuskontrolle."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_4="Suche und Navigation: Konfigurieren Sie Filter, Sortierung, Pagination, Tags und optionale externe Filter fuer grosse Datenmengen."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_5="Joomla-Artikelintegration: Verknuepfen Sie Records mit Artikeln inklusive Kategorie-, Sprach-, Veroeffentlichungsoptionen und Synchronisationsauswirkungen."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_6="Datenoperationen: Importieren Sie CSV/XLSX/XLS, synchronisieren Sie das Speicherschema und nutzen Sie Encoding-Reparatur bei inkonsistenten Quelldateien."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_7="Validierung und Erweiterbarkeit: Verwenden Sie Validierungs-Plugins, Listenaktions-Plugins, Content-Plugins sowie eigene Templates/Skripte."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_8="Frontend/Backend-Kontext: Legen Sie fest, wo eine Ansicht verfuegbar ist, und passen Sie die UX fuer oeffentliche Nutzer und Administratoren an."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_9="Betrieb und Qualitaet: Testen Sie mit mehreren Rollen, pruefen Sie Listen-Performance bei grossen Volumen und halten Sie Backup/Restore-Prozesse bereit."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_10="Funktionen des Ueber-Bildschirms: Pruefen Sie Version und erkannte Bibliotheken, fuehren Sie das Datenbank-Audit aus (Indizes, historische Tabellen, Kollationen) und starten Sie die DB-Reparatur (Migration gepackter Daten + Kollations-Normalisierung)."
