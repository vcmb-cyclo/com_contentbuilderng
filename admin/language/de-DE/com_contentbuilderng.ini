COM_CONTENTBUILDERNG_API_GET_STATS_DESC="Statistiken anzeigen. Mit &field=Feldname werden Summen nach Feldwert gruppiert; die Antwort enthält field.sum (gewichtete Summe der numerischen Werte, null wenn nicht numerisch). Mit &filter[field]=Feldname&filter[value]=Wert werden die Statistiken gefiltert."
COM_CONTENTBUILDERNG_API_STATS_SECTION_TITLE="Statistiken"
