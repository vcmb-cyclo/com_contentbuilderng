COM_CONTENTBUILDERNG_HELP_VIEWS_TITLE="Help - Views"
COM_CONTENTBUILDERNG_HELP_VIEWS_INTRO="Views control the full record lifecycle: creation, listing, detail display, editing, permissions, publication state, and advanced behavior. Use this help as a practical checklist before promoting a view to production."
COM_CONTENTBUILDERNG_HELP_VIEWS_POINT_1="View design: create one view per functional use case (public submission, back-office listing, detail page, internal workflow), give it an explicit name, and validate its data source and business goal to avoid overly generic views that are hard to maintain."
COM_CONTENTBUILDERNG_HELP_VIEWS_POINT_2="Recommended setup order: configure source, frontend/backend display context, and permissions first (view, create, edit, publish), then configure fields (list include, search include, linkable, editable), ordering, pagination, filters, theme plugins, and advanced options."
COM_CONTENTBUILDERNG_HELP_VIEWS_POINT_3="Quality and operations: test workflows with multiple user roles, verify validation and error feedback, confirm mass actions and publication behavior, then review performance on large lists and document key configuration decisions for future maintenance."
COM_CONTENTBUILDERNG_HELP_BACK_TO_VIEWS="Back to Views"
COM_CONTENTBUILDERNG_HELP_STORAGES_TITLE="Help - Data Storages"
COM_CONTENTBUILDERNG_HELP_STORAGES_INTRO="Data Storages define where records are physically stored and synchronized."
COM_CONTENTBUILDERNG_HELP_STORAGES_POINT_1="Create one storage per data structure you need to persist."
COM_CONTENTBUILDERNG_HELP_STORAGES_POINT_2="Keep table schema and storage fields synchronized after each structural change."
COM_CONTENTBUILDERNG_HELP_STORAGES_POINT_3="Use publish state and ordering to keep administration screens clear."
COM_CONTENTBUILDERNG_HELP_BACK_TO_STORAGES="Back to Data Storages"
COM_CONTENTBUILDERNG_HELP_ABOUT_TITLE="Help - About"
COM_CONTENTBUILDERNG_HELP_ABOUT_INTRO="ContentBuilder NG is a low-code data application component for Joomla. It helps you model data, build forms and list/detail pages, and control record workflows from configuration."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_1="Core architecture: Data Storages define physical tables and fields, while Views define business behavior and rendering."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_2="View outputs: configure create/edit forms, list views, record details, and latest-record behavior from one configuration set."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_3="Permissions and governance: manage view/create/edit/delete/publish rights by user group, with owner-specific options and state control."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_4="Search and navigation: configure filters, sorting, pagination, tags, and optional external filter integrations for large datasets."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_5="Article integration: map records to Joomla articles, with category/language/publication options and synchronization impacts."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_6="Data operations: import CSV/XLSX/XLS files, synchronize storage schema, and use encoding repair when source files are inconsistent."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_7="Validation and extensibility: use validation plugins, list-action plugins, content plugins, and custom templates/scripts to adapt behavior."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_8="Frontend and backend contexts: define where each view is available and tailor UX for public users and administrators."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_9="Maintenance and reliability: test with multiple roles, monitor list performance on large volumes, and keep backup/rollback procedures."
COM_CONTENTBUILDERNG_HELP_ABOUT_POINT_10="About screen utilities: review component version and detected libraries, run database audit checks (indexes, historical tables, collations), and execute DB Repair (packed-data migration + collation normalization)."
COM_CONTENTBUILDERNG_HELP_BACK_TO_ABOUT="Back to About"
