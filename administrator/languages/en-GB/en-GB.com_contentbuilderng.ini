COM_CONTENTBUILDERNG_SELECT_FILTER_DESC="Here you can define filters for each field. Once at least one field is filled in, the list view will only show records based on the filters filled in. Please note that with group output, you still need to add the filter values like you expect the output to be. For instance if the output of a group is value1, value2, value 3 and you like to show value1 and value2, the filter would be value1, value2. For value 1 and value 3 it would be value1, value3 and so on. For each filter you can seperate alternative filter criteria, seperating each value by &#124;. For instance peter&#124;paul&#124;mary would only return records that contain one of these names. The 2nd box after the filter defines the order in wich each filtered element should appear in the title. Please use numbers here."
