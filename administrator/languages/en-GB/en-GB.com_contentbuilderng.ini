COM_CONTENTBUILDERNG_HELP_CONFIG_TRANSFER_INTRO="The Configuration Transfer screen lets you export or import all or part of the ContentBuilder NG configuration."
COM_CONTENTBUILDERNG_HELP_CONFIG_TRANSFER_POINT_1="Use the Export/Import tabs to pick the workflow, then select which sections to include."
COM_CONTENTBUILDERNG_HELP_CONFIG_TRANSFER_POINT_2="In export mode, you can filter individual views and storages before generating the JSON file."
COM_CONTENTBUILDERNG_HELP_CONFIG_TRANSFER_POINT_3="In import mode, prefer Merge to keep existing data; use Replace only for a controlled reset."
