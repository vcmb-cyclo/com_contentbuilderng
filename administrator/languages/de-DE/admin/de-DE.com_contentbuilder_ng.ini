COM_CONTENTBUILDER_NG_HELP_ABOUT_TITLE="Hilfe - Ueber"
COM_CONTENTBUILDER_NG_HELP_ABOUT_INTRO="ContentBuilder NG ist eine Low-Code-Datenanwendung fuer Joomla. Damit modellieren Sie Daten, bauen Formulare sowie Listen/Detailansichten und steuern Record-Workflows per Konfiguration."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_1="Kernarchitektur: Datenspeicher definieren physische Tabellen/Felder, waehrend Ansichten Geschaeftslogik und Ausgabeverhalten definieren."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_2="Ausgabearten der Ansichten: Konfigurieren Sie Erstellen/Bearbeiten-Formulare, Listenansichten, Detailansichten und den Modus letzter Eintrag aus einer Konfiguration."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_3="Berechtigungen und Steuerung: Regeln Sie Ansehen/Erstellen/Bearbeiten/Loeschen/Veroeffentlichen je Benutzergruppe mit Besitzeroptionen und Statuskontrolle."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_4="Suche und Navigation: Konfigurieren Sie Filter, Sortierung, Pagination, Tags und optionale externe Filter fuer grosse Datenmengen."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_5="Joomla-Artikelintegration: Verknuepfen Sie Records mit Artikeln inklusive Kategorie-, Sprach-, Veroeffentlichungsoptionen und Synchronisationsauswirkungen."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_6="Datenoperationen: Importieren Sie CSV/XLSX/XLS, synchronisieren Sie das Speicherschema und nutzen Sie Encoding-Reparatur bei inkonsistenten Quelldateien."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_7="Validierung und Erweiterbarkeit: Verwenden Sie Validierungs-Plugins, Listenaktions-Plugins, Content-Plugins sowie eigene Templates/Skripte."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_8="Frontend/Backend-Kontext: Legen Sie fest, wo eine Ansicht verfuegbar ist, und passen Sie die UX fuer oeffentliche Nutzer und Administratoren an."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_9="Betrieb und Qualitaet: Testen Sie mit mehreren Rollen, pruefen Sie Listen-Performance bei grossen Volumen und halten Sie Backup/Restore-Prozesse bereit."
COM_CONTENTBUILDER_NG_HELP_ABOUT_POINT_10="Funktionen des Ueber-Bildschirms: Pruefen Sie Version und erkannte Bibliotheken, fuehren Sie das Datenbank-Audit aus (Indizes, Legacy-Tabellen, Kollationen) und starten Sie die DB-Reparatur (Legacy-Migration gepackter Daten + Kollations-Normalisierung)."
