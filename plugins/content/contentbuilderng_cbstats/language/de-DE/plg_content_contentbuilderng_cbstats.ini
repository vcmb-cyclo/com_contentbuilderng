PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_XML_DESCRIPTION="CBStats fügt Statistiken aus einer ContentBuilder-NG-Ansicht direkt in Joomla-Inhalte ein. Tabelle, JSON, Kreis- und Balkendiagramm verwenden dieselbe normalisierte PHP-Engine. title passt die globale Gesamtbezeichnung und titles die Kategoriebezeichnungen an."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_SOURCE="source muss view oder manual sein."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_MANUAL_OUTPUT="Der manuelle Modus unterstützt nur pie, bar, table und total."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_MANUAL_VALUES_REQUIRED="CBStats: Es wurden keine gültigen manuellen Werte angegeben."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_MANUAL_VALUE_INVALID="CBStats: Ungültiger manueller Wert „%s“."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_MANUAL_LABEL="Manueller Modus — Statistiken dauerhaft erhalten"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_MANUAL_TEXT="<p><code>source=manual</code> verwendet ausschließlich <code>values=</code>, ohne ContentBuilder-Ansicht, Feld oder Abfrage. Ergebnisse bleiben erhalten, wenn eine Ansicht wiederverwendet wird.</p><p><code>{CBStats source=manual output=pie values='100 km=45;150 km=47;200 km=38;200 km (Formel)=30' title='👥 Gesamtzahl der Anmeldungen'}</code></p><p>Ausgaben: <code>pie</code>, <code>bar</code>, <code>table</code>, <code>total</code>. <code>add=</code>, <code>titles=</code>, <code>title=</code>, <code>sort=none|title|label|value</code> und <code>dir=asc|desc</code> bleiben verfügbar. Doppelte Bezeichnungen werden addiert. Verwenden Sie in Bezeichnungen <code>\;</code>, <code>\=</code> und <code>\\</code>. Fügen Sie weder <code>id=</code> noch <code>field=</code> hinzu.</p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_VALUE="Wert"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_TOTAL="Gesamt"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_TOTAL_SEPARATOR=":"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_UNAVAILABLE="Statistiken nicht verfügbar"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_INVALID_REQUEST="Ungültige Statistikanfrage."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_MESSAGE="CBStats DEBUG: %s"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_ID_REQUIRED="Der Parameter id ist erforderlich."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_FIELD_REQUIRED="Der Parameter field ist für diese Ausgabe erforderlich."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_OUTPUT="Ungültige Ausgabe „%s“. Erlaubte Werte: total, table, form_name, sum, min, max, json, pie, bar."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_FILTER="filter[field] und filter[value] müssen gemeinsam angegeben werden."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_SORT="sort muss none, title oder value sein."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_DIR="dir muss asc oder desc sein."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_ACCESS_DENIED="Die STATS-Berechtigung ist für den aktuellen Benutzer verweigert."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_ADD="Ungültiger add-Parameter. Erwartet werden durch Semikolons getrennte Einträge Bezeichnung=VorzeichenbehafteteGanzzahl."
