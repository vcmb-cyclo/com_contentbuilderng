PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_ITEMS="ViewID=%1$s; %2$s Elemente=%3$s."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_NO_DATA="Keine Daten verfügbar"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_PIE_ARIA_LABEL="Kreisdiagramm: %s"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_BAR_ARIA_LABEL="Horizontales Balkendiagramm: %s"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_CHART_UNAVAILABLE="Diagramm nicht verfügbar. Die detaillierten Daten sind unten aufgeführt."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_LABEL="CBStats: Zweck und Ausgaben"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_ADD_LABEL="Filter, Sortierung und externe Werte"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_ADD_TEXT="<p><strong>Filter:</strong> Geben Sie <code>filter[field]</code> und <code>filter[value]</code> gemeinsam an. Ohne Platzhalter entspricht <code>filter[value]='200 km'</code> nur dem exakten Wert. Mit <code>filter[value]='200 km*'</code> akzeptiert <code>*</code> jede Zeichenfolge nach <code>200 km</code>. <code>|</code> trennt Alternativen. Äußere Leerzeichen werden entfernt.</p><p><strong>Vorzeichenbehaftete externe Deltas mit add=:</strong> Eine positive Ganzzahl fügt Vorkommen hinzu, null ändert nichts und eine negative Ganzzahl entfernt Vorkommen, zum Beispiel <code>add='100 km=5;150 km=-2'</code>. Ist das endgültige berechnete Ergebnis negativ, verwendet CBStats vor titles, Sortierung, Prozentberechnung und Ausgabe vorübergehend <code>0</code>, ohne die Quelldaten zu ändern. Ein späteres Ergebnis von null oder größer wird normal verwendet. Wiederholte Bezeichnungen werden kumuliert.</p><p><strong>Anzeigebezeichnungen mit titles=:</strong> <code>titles='Original=Anzeigetitel;Weiteres=Weiterer Titel'</code> benennt ausschließlich die Anzeige um. <code>add</code> verwendet zuerst die ursprünglichen Bezeichnungen. Nicht zugeordnete Bezeichnungen bleiben unverändert; identische Anzeigetitel führen Kategorien nicht zusammen. Semikolons trennen Zuordnungen, das erste Gleichheitszeichen trennt Original und Anzeigetitel.</p><p><strong>Sortierung:</strong> <code>sort=none|title|value</code> und <code>dir=asc|desc</code> gelten für Tabelle, JSON, Kreis- und Balkendiagramm. <code>sort=title</code> verwendet die endgültigen Anzeigetitel. Logische Reihenfolge: Daten → Filter → Gruppierung → add → Normalisierung → titles → Sortierung → Ausgabe.</p><p><strong>Beispiele:</strong><br><code>{CBStats id=25 field=Strecke output=pie add='100 km=-3'}</code><br><code>{CBStats id=25 field=Strecke output=table titles='1=Gruppe 1;2=Gruppe 2'}</code><br><code>{CBStats id=25 field=Strecke output=bar add='1=-2;2=3' titles='1=Gruppe 1;2=Gruppe 2' sort=value dir=desc}</code></p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_DEBUG_LABEL="URL/API, API + Rechte und DEBUG"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_PRESENTATION_LABEL="Gesamtbezeichnung und Hintergrund"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_PRESENTATION_TEXT="<p><code>title='👥 Gesamtzahl der Anmeldungen'</code> passt die globale Gesamtbezeichnung für Tabelle, Kreis- und Balkendiagramm an.</p><p><code>titles='Original=Anzeigetitel'</code> passt die Bezeichnungen einzelner Kategorien an.</p><p>CBStats ergänzt das Trennzeichen der aktiven Sprache, wenn es fehlt, und verdoppelt einen vorhandenen Doppelpunkt nicht.</p><p><code>background=</code> akzeptiert <code>transparent</code>, Hexadezimalfarben, <code>rgb()</code>, <code>rgba()</code> und die dokumentierten sicheren Farbnamen.</p><p><code>{CBStats id=25 field=Strecke output=pie title='👥 Gesamtzahl der Anmeldungen'}</code></p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_DEBUG_TEXT="<p><strong>URL/API:</strong> verfügbare Datenausgaben sind <code>json</code>, <code>total</code>, <code>sum</code>, <code>min</code>, <code>max</code> und <code>form_name</code>. JSON akzeptiert außerdem <code>add</code>, <code>titles</code>, <code>sort</code> und <code>dir</code>. Beispiel: <code>index.php?option=com_contentbuilderng&amp;task=api.display&amp;id=25&amp;action=cbstats&amp;field=Strecke&amp;output=json&amp;add=1%3D-2&amp;titles=1%3DGruppe%201</code>. Tabelle, Kreis- und Balkendiagramm bleiben Joomla-Inhalten vorbehalten.</p><p><strong>API + Rechte:</strong> Prüfen Sie ACLs, veröffentlichte und für API/Stats freigegebene Felder, die STATS-Berechtigung sowie den <strong>API</strong>-Tab der Ansicht. CBStats-URL/API erfordert STATS; andere Routen können API plus die angezeigten Rechte erfordern. Keine Anfrage umgeht Ansichts- oder Feldberechtigungen.</p><p><strong>DEBUG:</strong> Bei deaktiviertem DEBUG bleiben öffentliche Fehler knapp. Ist DEBUG in der Ansicht aktiviert, können sichere Diagnosen genauer sein. In einem Artikel-Tag fordert <code>debug=1</code> diese Details an; die API folgt direkt der DEBUG-Einstellung der Ansicht. DEBUG gewährt kein zusätzliches Recht und umgeht niemals ACLs.</p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_TEXT="<p>CBStats fügt direkt in Joomla-Inhalte Statistiken ein, die aus einer ContentBuilder-NG-Ansicht berechnet werden.</p><p><strong>Syntax:</strong> <code>{CBStats id=AnsichtID ...}</code>. Die Standardausgabe ist <code>total</code>.</p><p><strong>Verfügbare Ausgaben:</strong></p><ul><li><code>total</code>: Anzahl übereinstimmender Datensätze.</li><li><code>form_name</code>: Titel oder Name der Ansicht.</li><li><code>table</code>: HTML-Tabelle mit Wert-/Anzahlpaaren.</li><li><code>sum</code>, <code>min</code>, <code>max</code>: numerische Aggregate; ISO-Daten unterstützen chronologisches Min/Max.</li><li><code>json</code>: rohes <code>[{label,value}]</code>-Array.</li><li><code>pie</code>: responsives Kreisdiagramm mit dynamischen Farben, lokalisierten Prozentwerten, Tooltip, detaillierter Legende und Gesamtsumme.</li><li><code>bar</code>: responsives horizontales Balkendiagramm mit Werten, Prozenten, Tooltip, Legende, Gesamtsumme und Sortierung.</li></ul><p>Tabelle, JSON, Kreis- und Balkendiagramm verwenden dieselbe normalisierte PHP-Engine.</p><p><strong>Einfache Beispiele:</strong><br><code>{CBStats id=25 output=total}</code><br><code>{CBStats id=25 field=Strecke output=table}</code><br><code>{CBStats id=25 field=Strecke output=json}</code><br><code>{CBStats id=25 field=Strecke output=pie}</code><br><code>{CBStats id=25 field=Strecke output=bar sort=value dir=desc}</code></p>"
