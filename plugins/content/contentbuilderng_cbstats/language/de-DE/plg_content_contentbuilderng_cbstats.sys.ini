PLG_CONTENT_CONTENTBUILDERNG_CBSTATS="ContentBuilder NG - CBStats - Inhalt - Statistiken"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_XML_DESCRIPTION="CBStats zeigt dynamische Statistiken aus ContentBuilder-NG-Ansichten in Joomla-Inhalten an: Gesamtzahlen, Aggregate, Tabellen, JSON, Kreis- und Balkendiagramme, Filter, Sortierungen, vorzeichenbehaftete externe Anpassungen und umbenannte Anzeigebezeichnungen. Unterstützte Datenausgaben sind auch über URL/API-Anfragen verfügbar."
