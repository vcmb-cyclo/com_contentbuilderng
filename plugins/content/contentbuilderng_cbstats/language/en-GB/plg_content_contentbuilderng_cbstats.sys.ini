PLG_CONTENT_CONTENTBUILDERNG_CBSTATS="ContentBuilder NG - CBStats - Content statistics"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_XML_DESCRIPTION="CBStats displays dynamic statistics from ContentBuilder NG views in Joomla content: totals, aggregates, tables, JSON, Pie and Bar charts, filters, sorting, signed external adjustments and display-label renaming. Supported data outputs are also available through URL/API requests."
