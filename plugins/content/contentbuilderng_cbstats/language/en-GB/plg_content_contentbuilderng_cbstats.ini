PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_MANUAL_LABEL="Manual mode — preserve statistics"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_MANUAL_TEXT="<p><code>source=manual</code> uses only <code>values=</code>, without a ContentBuilder view, field or query. It preserves results when a view is reused.</p><p><code>{CBStats source=manual output=pie values='100 km=45;150 km=47;200 km=38;200 km (Formula)=30' title='👥 Total registrations'}</code></p><p>Outputs: <code>pie</code>, <code>bar</code>, <code>table</code>, <code>total</code>. <code>add=</code>, <code>titles=</code>, <code>title=</code>, <code>sort=none|title|label|value</code> and <code>dir=asc|desc</code> remain available. Duplicate labels are added. In labels, use <code>\;</code>, <code>\=</code> and <code>\\</code>. Do not add <code>id=</code> or <code>field=</code>.</p>"
