PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_LABEL="CBStats: purpose and outputs"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_ADD_LABEL="Filters, sorting and external values"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_ADD_TEXT="<p><strong>Filters:</strong> supply <code>filter[field]</code> and <code>filter[value]</code> together. Without a wildcard, <code>filter[value]='200 km'</code> matches only the exact value. With <code>filter[value]='200 km*'</code>, <code>*</code> accepts any character sequence after <code>200 km</code>. <code>|</code> separates alternatives. Surrounding spaces are trimmed.</p><p><strong>Signed external deltas with add=:</strong> use a positive integer to add, zero for no change, or a negative integer to remove occurrences, for example <code>add='100 km=5;150 km=-2'</code>. If the final calculated result is negative, CBStats temporarily uses <code>0</code> before titles, sorting, percentages and output without changing source data. A later zero or positive result is used normally. Repeated labels are cumulative.</p><p><strong>Display labels with titles=:</strong> <code>titles='Original=Display title;Other=Other title'</code> renames labels for display only. <code>add</code> uses original labels first. Unmapped labels remain unchanged, and identical display titles do not merge categories. Semicolons delimit mappings; the first equals sign separates the original and display title.</p><p><strong>Sorting:</strong> <code>sort=none|title|value</code> and <code>dir=asc|desc</code> apply to Table, JSON, Pie and Bar. <code>sort=title</code> uses final display titles. Logical order: data → filters → grouping → add → normalization → titles → sorting → output.</p><p><strong>Examples:</strong><br><code>{CBStats id=25 field=Route output=pie add='100 km=-3'}</code><br><code>{CBStats id=25 field=Route output=table titles='1=Group 1;2=Group 2'}</code><br><code>{CBStats id=25 field=Route output=bar add='1=-2;2=3' titles='1=Group 1;2=Group 2' sort=value dir=desc}</code></p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_DEBUG_LABEL="URL/API, API + Rights and DEBUG"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_PRESENTATION_LABEL="Total label and background"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_PRESENTATION_TEXT="<p><code>title='👥 Total registrations'</code> customizes the global total label for Table, Pie and Bar.</p><p><code>titles='Original=Display title'</code> customizes individual category labels.</p><p>CBStats adds the separator for the active language when it is omitted and does not duplicate an existing colon.</p><p><code>background=</code> accepts <code>transparent</code>, hexadecimal colours, <code>rgb()</code>, <code>rgba()</code> and the documented safe named colours.</p><p><code>{CBStats id=25 field=Route output=pie title='👥 Total registrations'}</code></p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_DEBUG_TEXT="<p><strong>URL/API:</strong> available data outputs are <code>json</code>, <code>total</code>, <code>sum</code>, <code>min</code>, <code>max</code> and <code>form_name</code>. JSON also accepts <code>add</code>, <code>titles</code>, <code>sort</code> and <code>dir</code>. Example: <code>index.php?option=com_contentbuilderng&amp;task=api.display&amp;id=25&amp;action=cbstats&amp;field=Route&amp;output=json&amp;add=1%3D-2&amp;titles=1%3DGroup%201</code>. Table, Pie and Bar remain restricted to Joomla content.</p><p><strong>API + Rights:</strong> check ACLs, fields published and enabled for API/Stats, the STATS permission and the view's <strong>API</strong> tab. CBStats URL/API requires STATS; other routes can require API plus the displayed rights. No request bypasses view or field permissions.</p><p><strong>DEBUG:</strong> with DEBUG disabled, public errors remain concise. When enabled on the view, safe diagnostics can be more precise. In an article tag, <code>debug=1</code> requests that detail; the API follows the view DEBUG setting directly. DEBUG grants no additional right and never bypasses ACLs.</p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_TEXT="<p>CBStats inserts statistics calculated from a ContentBuilder NG view directly into Joomla content.</p><p><strong>Syntax:</strong> <code>{CBStats id=ViewID ...}</code>. The default output is <code>total</code>.</p><p><strong>Available outputs:</strong></p><ul><li><code>total</code>: matching record count.</li><li><code>form_name</code>: view title or name.</li><li><code>table</code>: HTML value/count table.</li><li><code>sum</code>, <code>min</code>, <code>max</code>: numeric aggregates; ISO dates support chronological min/max.</li><li><code>json</code>: raw <code>[{label,value}]</code> array.</li><li><code>pie</code>: responsive Pie chart with dynamic colours, localized percentages, tooltip, detailed legend and total.</li><li><code>bar</code>: responsive horizontal Bar chart with values, percentages, tooltip, legend, total and sorting.</li></ul><p>Table, JSON, Pie and Bar use the same normalized PHP engine.</p><p><strong>Simple examples:</strong><br><code>{CBStats id=25 output=total}</code><br><code>{CBStats id=25 field=Route output=table}</code><br><code>{CBStats id=25 field=Route output=json}</code><br><code>{CBStats id=25 field=Route output=pie}</code><br><code>{CBStats id=25 field=Route output=bar sort=value dir=desc}</code></p>"
