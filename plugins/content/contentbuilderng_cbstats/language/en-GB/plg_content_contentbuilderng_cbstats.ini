PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_XML_DESCRIPTION="CBStats inserts statistics directly into Joomla content from a ContentBuilder NG view. Table, JSON, Pie and Bar share the same normalized PHP engine. title customizes the global total label and titles customizes category labels."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_SOURCE="source must be view or manual."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_MANUAL_OUTPUT="Manual mode supports only pie, bar, table and total outputs."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_MANUAL_VALUES_REQUIRED="CBStats: no valid manual values were provided."
