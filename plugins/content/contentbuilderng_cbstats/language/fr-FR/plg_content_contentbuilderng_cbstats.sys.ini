PLG_CONTENT_CONTENTBUILDERNG_CBSTATS="ContentBuilder NG - CBStats - Content - Statistiques"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_XML_DESCRIPTION="CBStats affiche dans les contenus Joomla des statistiques dynamiques issues des vues ContentBuilder NG : totaux, agrégats, tableaux, JSON, graphiques Pie et Bar, filtres, tris, ajustements externes signés et renommage des libellés affichés. Les sorties de données prises en charge sont également accessibles par URL/API."
