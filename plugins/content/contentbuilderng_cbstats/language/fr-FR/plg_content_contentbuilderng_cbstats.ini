PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_XML_DESCRIPTION="CBStats insère directement dans les contenus Joomla des statistiques calculées à partir d’une vue ContentBuilder NG. Le paramètre export=manual affiche une syntaxe manuelle figée, visible et directement copiable dans un autre article."
