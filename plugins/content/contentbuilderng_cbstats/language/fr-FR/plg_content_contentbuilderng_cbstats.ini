PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_EXPORT_LABEL="Export manuel"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_EXPORT_TEXT="<p>Seul <code>export=manual</code> affiche les résultats finaux et la syntaxe <code>source=manual</code> visible sous les outputs Pie, Bar et Table. Les libellés finaux après <code>titles=</code>, les ajouts et le tri sont directement intégrés dans <code>values=</code> ; <code>titles=</code> n’est pas recopié.</p><p><code>{CBStats id=25 field=Parcours output=pie title='👥 Total des inscrits' export=manual}</code></p><p>Le bouton centré <strong>Copier la syntaxe</strong> copie exactement la syntaxe affichée au-dessus. Avec une source déjà manuelle, la syntaxe finale normalisée est affichée une seule fois, sans imbrication.</p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_SOURCE="source doit valoir view ou manual."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_DEBUG_INVALID_MANUAL_OUTPUT="Le mode manuel accepte uniquement les outputs pie, bar, table et total."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_MANUAL_VALUES_REQUIRED="CBStats : aucune valeur manuelle valide n’a été fournie."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_MANUAL_VALUE_INVALID="CBStats : valeur manuelle invalide « %s »."
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_MANUAL_LABEL="Mode manuel — figer des statistiques"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_MANUAL_TEXT="<p><code>source=manual</code> utilise exclusivement <code>values=</code>, sans vue, champ ni requête ContentBuilder. Il conserve les résultats même si une vue est réutilisée.</p><p><code>{CBStats source=manual output=pie values='100 km=45;150 km=47;200 km=38;200 km (Formule)=30' title='👥 Total des inscrits'}</code></p><p>Outputs&nbsp;: <code>pie</code>, <code>bar</code>, <code>table</code>, <code>total</code>. <code>add=</code>, <code>titles=</code>, <code>title=</code>, <code>sort=none|title|label|value</code> et <code>dir=asc|desc</code> restent disponibles. Les doublons sont additionnés. Dans un libellé, utilisez <code>\;</code>, <code>\=</code> et <code>\\</code>. N’ajoutez ni <code>id=</code> ni <code>field=</code>.</p>"
