PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_PIE_ARIA_LABEL="Graphique Pie : %s"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_BAR_ARIA_LABEL="Graphique à barres horizontal : %s"
