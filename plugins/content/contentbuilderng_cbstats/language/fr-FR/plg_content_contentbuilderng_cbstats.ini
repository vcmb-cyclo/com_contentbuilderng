PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_LABEL="CBStats : finalité et outputs"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_ADD_LABEL="Filtres, tri et valeurs externes"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_ADD_TEXT="<p><strong>Filtres&nbsp;:</strong> fournissez ensemble <code>filter[field]</code> et <code>filter[value]</code>. Sans joker, <code>filter[value]='200 km'</code> correspond uniquement à la valeur exacte. Avec <code>filter[value]='200 km*'</code>, <code>*</code> accepte toute suite de caractères après <code>200 km</code>. <code>|</code> sépare les alternatives. Les espaces extérieurs sont supprimés.</p><p><strong>Deltas externes signés avec add=&nbsp;:</strong> utilisez un entier positif pour ajouter, zéro pour ne rien modifier ou un entier négatif pour retirer des occurrences, par exemple <code>add='100 km=5;150 km=-2'</code>. Si le résultat final calculé est négatif, CBStats utilise temporairement <code>0</code> avant les titres, le tri, les pourcentages et le rendu, sans modifier les données sources. Un résultat ultérieur nul ou positif est utilisé normalement. Les libellés répétés sont cumulés.</p><p><strong>Libellés d'affichage avec titles=&nbsp;:</strong> <code>titles='Original=Titre affiché;Autre=Autre titre'</code> renomme uniquement l'affichage. <code>add</code> utilise d'abord les libellés originaux. Les libellés non indiqués restent inchangés et deux titres affichés identiques ne fusionnent pas les catégories. Le point-virgule sépare les mappings&nbsp;; le premier signe égal sépare l'original du titre affiché.</p><p><strong>Tri&nbsp;:</strong> <code>sort=none|title|value</code> et <code>dir=asc|desc</code> s'appliquent à Table, JSON, Pie et Bar. <code>sort=title</code> utilise les titres affichés finaux. Ordre logique&nbsp;: données → filtres → regroupement → add → normalisation → titles → tri → output.</p><p><strong>Exemples&nbsp;:</strong><br><code>{CBStats id=25 field=Parcours output=pie add='100 km=-3'}</code><br><code>{CBStats id=25 field=Parcours output=table titles='1=Groupe 1;2=Groupe 2'}</code><br><code>{CBStats id=25 field=Parcours output=bar add='1=-2;2=3' titles='1=Groupe 1;2=Groupe 2' sort=value dir=desc}</code></p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_DEBUG_LABEL="URL/API, API + Droits et DEBUG"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_PRESENTATION_LABEL="Libellé du total et arrière-plan"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_PRESENTATION_TEXT="<p><code>title='👥 Total des inscrits'</code> personnalise le libellé global du total pour Table, Pie et Bar.</p><p><code>titles='Original=Titre affiché'</code> personnalise les libellés individuels des catégories.</p><p>CBStats ajoute le séparateur adapté à la langue active lorsqu’il est absent et ne double pas un caractère « : » déjà présent.</p><p><code>background=</code> accepte <code>transparent</code>, les couleurs hexadécimales, <code>rgb()</code>, <code>rgba()</code> et les couleurs nommées sûres documentées.</p><p><code>{CBStats id=25 field=Parcours output=pie title='👥 Total des inscrits'}</code></p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_DEBUG_TEXT="<p><strong>URL/API&nbsp;:</strong> les outputs de données disponibles sont <code>json</code>, <code>total</code>, <code>sum</code>, <code>min</code>, <code>max</code> et <code>form_name</code>. JSON accepte aussi <code>add</code>, <code>titles</code>, <code>sort</code> et <code>dir</code>. Exemple&nbsp;: <code>index.php?option=com_contentbuilderng&amp;task=api.display&amp;id=25&amp;action=cbstats&amp;field=Parcours&amp;output=json&amp;add=1%3D-2&amp;titles=1%3DGroupe%201</code>. Table, Pie et Bar restent réservés aux contenus Joomla.</p><p><strong>API + Droits&nbsp;:</strong> vérifiez les ACL, les champs publiés et autorisés pour API/Stats, la permission STATS et l'onglet <strong>API</strong> de la vue. L'URL/API CBStats exige STATS&nbsp;; les autres routes peuvent exiger API plus les droits affichés. Aucune requête ne contourne les droits de la vue ou du champ.</p><p><strong>DEBUG&nbsp;:</strong> lorsque DEBUG est désactivé, les erreurs publiques restent sobres. Lorsqu'il est activé sur la vue, les diagnostics sûrs peuvent être plus précis. Dans une balise d'article, <code>debug=1</code> demande ce détail&nbsp;; l'API suit directement le réglage DEBUG de la vue. DEBUG ne donne aucun droit supplémentaire et ne contourne jamais les ACL.</p>"
PLG_CONTENT_CONTENTBUILDERNG_CBSTATS_HELP_TEXT="<p>CBStats insère directement dans un contenu Joomla des statistiques calculées à partir d'une vue ContentBuilder NG.</p><p><strong>Syntaxe&nbsp;:</strong> <code>{CBStats id=IdVue ...}</code>. La sortie par défaut est <code>total</code>.</p><p><strong>Outputs disponibles&nbsp;:</strong></p><ul><li><code>total</code>&nbsp;: nombre d'enregistrements correspondants.</li><li><code>form_name</code>&nbsp;: titre ou nom de la vue.</li><li><code>table</code>&nbsp;: tableau HTML valeur/nombre.</li><li><code>sum</code>, <code>min</code>, <code>max</code>&nbsp;: agrégats numériques&nbsp;; les dates ISO acceptent un min/max chronologique.</li><li><code>json</code>&nbsp;: tableau brut <code>[{label,value}]</code>.</li><li><code>pie</code>&nbsp;: graphique circulaire responsive avec couleurs dynamiques, pourcentages localisés, infobulle, légende détaillée et total.</li><li><code>bar</code>&nbsp;: histogramme horizontal responsive avec valeurs, pourcentages, infobulle, légende, total et tri.</li></ul><p>Table, JSON, Pie et Bar utilisent le même moteur PHP normalisé.</p><p><strong>Exemples simples&nbsp;:</strong><br><code>{CBStats id=25 output=total}</code><br><code>{CBStats id=25 field=Parcours output=table}</code><br><code>{CBStats id=25 field=Parcours output=json}</code><br><code>{CBStats id=25 field=Parcours output=pie}</code><br><code>{CBStats id=25 field=Parcours output=bar sort=value dir=desc}</code></p>"
