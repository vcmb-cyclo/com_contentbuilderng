PLG_CONTENT_CONTENTBUILDERNG_VERIFY_XML_DESCRIPTION="Plugin de contenu qui remplace les balises {CBVerify} dans les articles Joomla et autre contenu HTML par un lien ou un widget de vérification fourni par un plugin de vérification ContentBuilder NG (paypal, passthrough, ...). Syntaxe : {CBVerify plugin:Nom; verification-name:...; verify-view:IdVue; option:valeur; ...} ; les options plugin, verification-name et verify-view sont obligatoires. Les valeurs d'options peuvent être localisées par langue avec langue___valeur|langue2___valeur2 ; les options inconnues sont transmises au plugin de vérification."
PLG_CONTENT_CONTENTBUILDERNG_VERIFY="ContentBuilder NG - Verify"
