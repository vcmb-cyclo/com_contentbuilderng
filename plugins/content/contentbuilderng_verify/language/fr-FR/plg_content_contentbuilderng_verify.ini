PLG_CONTENT_CONTENTBUILDERNG_VERIFY_HELP_LABEL="Référence de syntaxe {CBVerify}"
PLG_CONTENT_CONTENTBUILDERNG_VERIFY_HELP_TEXT="<p>Les options sont séparées par <code>;</code> et s'écrivent <code>nom:valeur</code>. Obligatoires&nbsp;: <code>plugin</code> (nom du plugin de vérification ContentBuilder NG, par exemple paypal ou passthrough), <code>verification-name</code> et <code>verify-view</code> (identifiant de vue)&nbsp;; une balise à laquelle il en manque une est remplacée par un avertissement.</p><ul><li><code>verification-msg</code> — message associé à la vérification.</li><li><code>verify-levels</code> — liste séparée par des virgules parmi <code>new</code>, <code>edit</code>, <code>view</code>.</li><li><code>require-view</code> — indicateur transmis à la vérification.</li><li><code>desc</code> — texte du lien de vérification (par défaut «&nbsp;Verify&nbsp;»)&nbsp;; <code>image</code>, <code>image-width</code>, <code>image-height</code> — affichent une image à la place du texte.</li><li><code>return-site</code>, <code>return-admin</code> — URL de retour après vérification côté site/administration.</li><li>Toute autre option est transmise au plugin de vérification.</li></ul><p><strong>Valeurs localisées&nbsp;:</strong> chaque valeur peut varier par langue avec <code>langue___valeur|langue2___valeur2</code> (par exemple <code>fr-fr___Vérifier|en-gb___Verify</code>)&nbsp;; la première entrée sert de valeur de repli.</p><p><strong>Comportement&nbsp;:</strong> si le plugin de vérification affiche son propre widget (évènement onViewport), ce widget remplace la balise&nbsp;; sinon, un lien ou une image pointant vers la vue de vérification est inséré.</p><p><strong>Exemple&nbsp;:</strong> <code>{CBVerify plugin:paypal; verification-name:Adhésion; verify-view:12; verify-levels:view; desc:Payer maintenant}</code></p>"
