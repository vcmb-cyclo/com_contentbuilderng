PLG_CONTENT_CONTENTBUILDERNG_VERIFY_HELP_LABEL="{CBVerify}-Syntaxreferenz"
PLG_CONTENT_CONTENTBUILDERNG_VERIFY_HELP_TEXT="<p>Optionen werden durch <code>;</code> getrennt und als <code>Name:Wert</code> geschrieben. Erforderlich: <code>plugin</code> (Name des ContentBuilder-NG-Verifizierungs-Plugins, z.&nbsp;B. paypal oder passthrough), <code>verification-name</code> und <code>verify-view</code> (Ansicht-ID); ein Tag, dem eine davon fehlt, wird durch eine Warnung ersetzt.</p><ul><li><code>verification-msg</code> — der Verifizierung zugeordnete Meldung.</li><li><code>verify-levels</code> — kommagetrennte Liste aus <code>new</code>, <code>edit</code>, <code>view</code>.</li><li><code>require-view</code> — an die Verifizierung übergebenes Kennzeichen.</li><li><code>desc</code> — Text des Verifizierungslinks (Standard „Verify“); <code>image</code>, <code>image-width</code>, <code>image-height</code> — zeigen ein Bild anstelle des Textes.</li><li><code>return-site</code>, <code>return-admin</code> — Rückkehr-URLs nach der Verifizierung im Frontend/Backend.</li><li>Jede andere Option wird an das Verifizierungs-Plugin weitergereicht.</li></ul><p><strong>Lokalisierte Werte:</strong> Jeder Wert kann pro Sprache mit <code>sprache___wert|sprache2___wert2</code> variieren (zum Beispiel <code>fr-fr___Vérifier|en-gb___Verify</code>); der erste Eintrag dient als Rückfallwert.</p><p><strong>Verhalten:</strong> Rendert das Verifizierungs-Plugin ein eigenes Widget (onViewport-Ereignis), ersetzt dieses Widget das Tag; andernfalls wird ein Link oder Bild zur Verifizierungsansicht eingefügt.</p><p><strong>Beispiel:</strong> <code>{CBVerify plugin:paypal; verification-name:Mitgliedschaft; verify-view:12; verify-levels:view; desc:Jetzt zahlen}</code></p>"
