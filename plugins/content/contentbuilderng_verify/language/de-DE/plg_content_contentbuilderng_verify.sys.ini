PLG_CONTENT_CONTENTBUILDERNG_VERIFY_XML_DESCRIPTION="Inhalts-Plugin, das {CBVerify}-Tags in Joomla-Artikeln und anderem HTML-Inhalt durch einen Verifizierungslink oder ein Widget eines ContentBuilder-NG-Verifizierungs-Plugins (paypal, passthrough, ...) ersetzt. Syntax: {CBVerify plugin:Name; verification-name:...; verify-view:AnsichtID; Option:Wert; ...}; die Optionen plugin, verification-name und verify-view sind erforderlich. Optionswerte können pro Sprache mit sprache___wert|sprache2___wert2 lokalisiert werden; unbekannte Optionen werden an das Verifizierungs-Plugin weitergereicht."
PLG_CONTENT_CONTENTBUILDERNG_VERIFY="ContentBuilder NG - Verify"
