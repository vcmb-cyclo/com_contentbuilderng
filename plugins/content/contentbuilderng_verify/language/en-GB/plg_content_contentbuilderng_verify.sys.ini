PLG_CONTENT_CONTENTBUILDERNG_VERIFY_XML_DESCRIPTION="Content plugin that replaces {CBVerify} tags in Joomla articles and other HTML content with a verification link or widget provided by a ContentBuilder NG verification plugin (paypal, passthrough, ...). Syntax: {CBVerify plugin:Name; verification-name:...; verify-view:ViewID; option:value; ...}; the options plugin, verification-name and verify-view are required. Option values can be localised per language with lang___value|lang2___value2; unknown options are passed to the verification plugin."
PLG_CONTENT_CONTENTBUILDERNG_VERIFY="ContentBuilder NG - Verify"
