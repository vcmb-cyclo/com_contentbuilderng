PLG_CONTENT_CONTENTBUILDERNG_VERIFY_HELP_LABEL="{CBVerify} syntax reference"
PLG_CONTENT_CONTENTBUILDERNG_VERIFY_HELP_TEXT="<p>Options are separated by <code>;</code> and written as <code>name:value</code>. Required: <code>plugin</code> (name of the ContentBuilder NG verification plugin, e.g. paypal or passthrough), <code>verification-name</code> and <code>verify-view</code> (view ID); a tag missing one of them is replaced by a warning.</p><ul><li><code>verification-msg</code> — message attached to the verification.</li><li><code>verify-levels</code> — comma-separated list among <code>new</code>, <code>edit</code>, <code>view</code>.</li><li><code>require-view</code> — flag passed to the verification.</li><li><code>desc</code> — text of the verification link (default 'Verify'); <code>image</code>, <code>image-width</code>, <code>image-height</code> — show an image instead of the text.</li><li><code>return-site</code>, <code>return-admin</code> — return URLs after verification on the frontend/backend.</li><li>Any other option is passed on to the verification plugin.</li></ul><p><strong>Localised values:</strong> every value can vary per language using <code>lang___value|lang2___value2</code> (for example <code>fr-fr___Vérifier|en-gb___Verify</code>); the first entry is the fallback.</p><p><strong>Behaviour:</strong> if the verification plugin renders its own widget (onViewport event), the widget replaces the tag; otherwise a link or image pointing to the verification view is inserted.</p><p><strong>Example:</strong> <code>{CBVerify plugin:paypal; verification-name:Membership; verify-view:12; verify-levels:view; desc:Pay now}</code></p>"
