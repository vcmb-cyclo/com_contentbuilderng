PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_FIELD_MAX_FILESIZE_LABEL="Maximale Dateigröße (MB)"
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_HELP_LABEL="{CBImageScale}-Syntaxreferenz"
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_HELP_TEXT="<p>Optionen werden durch <code>;</code> getrennt und als <code>Name:Wert</code> geschrieben:</p><ul><li><code>field</code> — Name des Upload-Feldes mit dem/den Bild(ern); im Listenkontext standardmäßig das aktuelle Listenfeld.</li><li><code>width</code>, <code>height</code> — Abmessungen des skalierten Bildes; <code>original-width</code>, <code>original-height</code> — Abmessungen der Kopie, die beim Öffnen des Originals angezeigt wird.</li><li><code>type</code> — Skalierungsmodus: <code>crop</code> (passend zuschneiden), <code>simple</code> (einfache Skalierung) oder standardmäßig Letterbox; <code>background-color</code> — Füllfarbe des Letterbox-Modus.</li><li><code>alt</code>, <code>title</code> — Alternativtext und Titel des Bildes; im Listenkontext verwendet <code>alt:USE-TITLE</code> den Datensatztitel.</li><li><code>open:true</code> — ein Klick auf das Bild öffnet das Original in einem Popup-Fenster.</li><li><code>cache</code>, <code>global_cache</code> — Cache-Laufzeiten in Sekunden (Standard 86400); <code>folder</code> — alternativer Cache-Ordner.</li><li><code>align</code> — <code>left</code> oder <code>right</code>, um das Bild fließen zu lassen.</li><li><code>default-image</code>, <code>default-image-width</code>, <code>default-image-height</code> — Platzhalterbild aus media/contentbuilderng/plugins/image_scale, das angezeigt wird, wenn das Feld kein Bild enthält.</li></ul><p><strong>Verhalten:</strong> Erfordert die PHP-Erweiterung GD (ohne sie bleibt das Plugin passiv); skalierte Dateien werden pro Ansicht unter <code>media/contentbuilderng/plugins/image_scale/cache/</code> zwischengespeichert, und der Cache einer Ansicht mit geschütztem Upload-Verzeichnis wird per .htaccess für direkten Zugriff gesperrt; die VIEW-Berechtigung des aktuellen Benutzers wird geprüft, und eine verweigerte direkte Bildanfrage antwortet mit „No Access“; die Plugin-Option „Max. Filesize“ begrenzt die akzeptierte Quelldateigröße (Standard 4 MB).</p><p><strong>Beispiel:</strong> <code>{CBImageScale field:Foto; width:300; height:200; type:crop; open:true}</code></p>"
