PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_XML_DESCRIPTION="Inhalts-Plugin, das {CBImageScale}-Tags in Joomla-Artikeln und ContentBuilder-NG-Listen/Detailansichten durch skalierte Versionen der im verknüpften Datensatz hochgeladenen Bilder ersetzt. Die Bilder werden mit PHP GD skaliert (Letterbox-, Crop- oder Simple-Modus) und unter media/contentbuilderng/plugins/image_scale zwischengespeichert; der Cache einer Ansicht mit geschütztem Upload-Verzeichnis wird per .htaccess gesperrt. Syntax: {CBImageScale field:Feldname; width:...; height:...; Option:Wert; ...}. Erfordert die PHP-Erweiterung GD und prüft die VIEW-Berechtigung der Ansicht."
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE="ContentBuilder NG - Content - Image Scale"
