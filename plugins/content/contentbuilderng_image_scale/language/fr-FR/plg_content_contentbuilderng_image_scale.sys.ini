PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_XML_DESCRIPTION="Plugin de contenu qui remplace les balises {CBImageScale} dans les articles Joomla et les listes/détails ContentBuilder NG par des versions redimensionnées des images téléversées dans l'enregistrement lié. Les images sont redimensionnées avec PHP GD (mode letterbox, crop ou simple) et mises en cache sous media/contentbuilderng/plugins/image_scale ; le cache d'une vue au répertoire de téléversement protégé est bloqué par .htaccess. Syntaxe : {CBImageScale field:NomDuChamp; width:...; height:...; option:valeur; ...}. Nécessite l'extension PHP GD et vérifie la permission VIEW de la vue."
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE="ContentBuilder NG - Content - Image Scale"
