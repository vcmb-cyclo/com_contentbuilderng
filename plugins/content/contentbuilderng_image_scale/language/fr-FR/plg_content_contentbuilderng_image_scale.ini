PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_FIELD_MAX_FILESIZE_LABEL="Taille maximale de fichier (Mo)"
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_HELP_LABEL="Référence de syntaxe {CBImageScale}"
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_HELP_TEXT="<p>Les options sont séparées par <code>;</code> et s'écrivent <code>nom:valeur</code>&nbsp;:</p><ul><li><code>field</code> — nom du champ de téléversement contenant la ou les images&nbsp;; en contexte de liste, il vaut par défaut le champ courant de la liste.</li><li><code>width</code>, <code>height</code> — dimensions de l'image redimensionnée&nbsp;; <code>original-width</code>, <code>original-height</code> — dimensions de la copie affichée à l'ouverture de l'original.</li><li><code>type</code> — mode de redimensionnement&nbsp;: <code>crop</code> (recadrage), <code>simple</code> (redimensionnement simple) ou letterbox par défaut&nbsp;; <code>background-color</code> — couleur de remplissage du letterbox.</li><li><code>alt</code>, <code>title</code> — texte alternatif et titre de l'image&nbsp;; en contexte de liste, <code>alt:USE-TITLE</code> utilise le titre de l'enregistrement.</li><li><code>open:true</code> — un clic sur l'image ouvre l'original dans une fenêtre surgissante.</li><li><code>cache</code>, <code>global_cache</code> — durées de cache en secondes (86400 par défaut)&nbsp;; <code>folder</code> — dossier de cache alternatif.</li><li><code>align</code> — <code>left</code> ou <code>right</code> pour faire flotter l'image.</li><li><code>default-image</code>, <code>default-image-width</code>, <code>default-image-height</code> — image de substitution depuis media/contentbuilderng/plugins/image_scale affichée quand le champ ne contient pas d'image.</li></ul><p><strong>Comportement&nbsp;:</strong> nécessite l'extension PHP GD (le plugin reste passif sans elle)&nbsp;; les fichiers redimensionnés sont mis en cache sous <code>media/contentbuilderng/plugins/image_scale/cache/</code> par vue, et le cache d'une vue au répertoire de téléversement protégé est interdit d'accès direct par .htaccess&nbsp;; la permission VIEW de l'utilisateur courant est vérifiée et une demande d'image directe refusée répond «&nbsp;No Access&nbsp;»&nbsp;; l'option «&nbsp;Max. Filesize&nbsp;» du plugin limite la taille des fichiers source acceptés (4&nbsp;Mo par défaut).</p><p><strong>Exemple&nbsp;:</strong> <code>{CBImageScale field:Photo; width:300; height:200; type:crop; open:true}</code></p>"
