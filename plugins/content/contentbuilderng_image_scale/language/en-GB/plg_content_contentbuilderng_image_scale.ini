PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_FIELD_MAX_FILESIZE_LABEL="Max. file size (MB)"
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_HELP_LABEL="{CBImageScale} syntax reference"
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_HELP_TEXT="<p>Options are separated by <code>;</code> and written as <code>name:value</code>:</p><ul><li><code>field</code> — name of the upload field containing the image(s); in list context it defaults to the current list field.</li><li><code>width</code>, <code>height</code> — dimensions of the scaled image; <code>original-width</code>, <code>original-height</code> — dimensions of the copy shown when the original is opened.</li><li><code>type</code> — scaling mode: <code>crop</code> (crop to fit), <code>simple</code> (simple resize) or letterbox by default; <code>background-color</code> — letterbox fill colour.</li><li><code>alt</code>, <code>title</code> — alternative text and title of the image; in list context <code>alt:USE-TITLE</code> uses the record title.</li><li><code>open:true</code> — clicking the image opens the original in a popup window.</li><li><code>cache</code>, <code>global_cache</code> — cache lifetimes in seconds (default 86400); <code>folder</code> — alternative cache folder.</li><li><code>align</code> — <code>left</code> or <code>right</code> to float the image.</li><li><code>default-image</code>, <code>default-image-width</code>, <code>default-image-height</code> — placeholder from media/contentbuilderng/plugins/image_scale shown when the field holds no image.</li></ul><p><strong>Behaviour:</strong> requires the PHP GD extension (the plugin stays passive without it); scaled files are cached under <code>media/contentbuilderng/plugins/image_scale/cache/</code> per view, and the cache of a view with protected upload directory is denied direct access via .htaccess; the current user's VIEW permission is checked and a denied direct image request answers 'No Access'; the plugin option 'Max. Filesize' limits the accepted source file size (4 MB by default).</p><p><strong>Example:</strong> <code>{CBImageScale field:Photo; width:300; height:200; type:crop; open:true}</code></p>"
