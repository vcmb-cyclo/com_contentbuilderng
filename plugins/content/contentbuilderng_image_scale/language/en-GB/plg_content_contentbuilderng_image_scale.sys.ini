PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE_XML_DESCRIPTION="Content plugin that replaces {CBImageScale} tags in Joomla articles and ContentBuilder NG lists/details with scaled versions of the images uploaded to the linked record. Images are resized with PHP GD (letterbox, crop or simple mode) and cached under media/contentbuilderng/plugins/image_scale; the cache of a view with protected upload directory is shielded by .htaccess. Syntax: {CBImageScale field:FieldName; width:...; height:...; option:value; ...}. Requires the PHP GD extension and checks the view's VIEW permission."
PLG_CONTENT_CONTENTBUILDERNG_IMAGE_SCALE="ContentBuilder NG - Content - Image Scale"
