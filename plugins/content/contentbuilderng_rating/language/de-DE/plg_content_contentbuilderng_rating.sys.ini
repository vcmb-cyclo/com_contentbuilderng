PLG_CONTENT_CONTENTBUILDERNG_RATING_XML_DESCRIPTION="Inhalts-Plugin, das {CBRating}-Tags in Joomla-Artikeln und ContentBuilder-NG-Listen/Detailansichten durch eine Bewertungsleiste für den verknüpften Datensatz ersetzt, die dessen aktuelle Durchschnittsbewertung und Stimmenzahl anzeigt. Die Anzahl der Bewertungsstufen wird pro Ansicht festgelegt; Abstimmen erfordert die RATING-Berechtigung, andernfalls ist die Leiste schreibgeschützt. Syntax: {CBRating} (ohne Optionen)."
PLG_CONTENT_CONTENTBUILDERNG_RATING="ContentBuilder NG - Content - Rating"
