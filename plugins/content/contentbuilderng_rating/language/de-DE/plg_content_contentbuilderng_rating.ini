PLG_CONTENT_CONTENTBUILDERNG_RATING_HELP_TEXT="<p>Fügen Sie <code>{CBRating}</code> in einen aus einem ContentBuilder-NG-Datensatz erzeugten Joomla-Artikel oder in eine ContentBuilder-NG-Inhaltsvorlage ein: Das Tag wird durch eine Bewertungsleiste ersetzt, die die aktuelle Durchschnittsbewertung des Datensatzes und die Stimmenzahl anzeigt.</p><ul><li>Die Anzahl der Bewertungsstufen wird pro Ansicht konfiguriert.</li><li>Abstimmen erfordert die RATING-Berechtigung des aktuellen Benutzers; ohne sie wird die Leiste schreibgeschützt angezeigt.</li><li>Das Tag akzeptiert keine Optionen; jedes Vorkommen wird ersetzt.</li></ul><p><strong>Beispiel:</strong> <code>{CBRating}</code></p>"
