PLG_CONTENT_CONTENTBUILDERNG_RATING_HELP_LABEL="{CBRating} syntax reference"
PLG_CONTENT_CONTENTBUILDERNG_RATING_HELP_TEXT="<p>Insert <code>{CBRating}</code> in a Joomla article generated from a ContentBuilder NG record or in a ContentBuilder NG content template: the tag is replaced by a rating bar showing the record's current average rating and vote count.</p><ul><li>The number of rating slots is configured per view.</li><li>Voting requires the RATING permission for the current user; without it the bar is displayed read-only.</li><li>The tag takes no options; each occurrence is replaced.</li></ul><p><strong>Example:</strong> <code>{CBRating}</code></p>"
