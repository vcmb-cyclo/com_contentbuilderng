PLG_CONTENT_CONTENTBUILDERNG_RATING_XML_DESCRIPTION="Content plugin that replaces {CBRating} tags in Joomla articles and ContentBuilder NG lists/details with a rating bar for the linked record, showing its current average rating and vote count. The number of rating slots is defined per view; voting requires the RATING permission, otherwise the bar is read-only. Syntax: {CBRating} (no options)."
PLG_CONTENT_CONTENTBUILDERNG_RATING="ContentBuilder NG - Content - Rating"
