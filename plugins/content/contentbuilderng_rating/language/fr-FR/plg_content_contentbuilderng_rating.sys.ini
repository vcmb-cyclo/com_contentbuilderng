PLG_CONTENT_CONTENTBUILDERNG_RATING_XML_DESCRIPTION="Plugin de contenu qui remplace les balises {CBRating} dans les articles Joomla et les listes/détails ContentBuilder NG par une barre de notation pour l'enregistrement lié, affichant sa note moyenne actuelle et le nombre de votes. Le nombre de crans de notation est défini par vue ; voter nécessite la permission RATING, sinon la barre est en lecture seule. Syntaxe : {CBRating} (sans option)."
PLG_CONTENT_CONTENTBUILDERNG_RATING="ContentBuilder NG - Content - Rating"
