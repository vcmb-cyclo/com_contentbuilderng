PLG_CONTENT_CONTENTBUILDERNG_RATING_HELP_TEXT="<p>Insérez <code>{CBRating}</code> dans un article Joomla généré depuis un enregistrement ContentBuilder NG ou dans un modèle de contenu ContentBuilder NG&nbsp;: la balise est remplacée par une barre de notation affichant la note moyenne actuelle de l'enregistrement et le nombre de votes.</p><ul><li>Le nombre de crans de notation est configuré par vue.</li><li>Voter nécessite la permission RATING pour l'utilisateur courant&nbsp;; sans elle, la barre est affichée en lecture seule.</li><li>La balise n'accepte aucune option&nbsp;; chaque occurrence est remplacée.</li></ul><p><strong>Exemple&nbsp;:</strong> <code>{CBRating}</code></p>"
