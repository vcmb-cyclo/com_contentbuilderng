PLG_CONTENT_CONTENTBUILDERNG_PERMISSION_OBSERVER_XML_DESCRIPTION="Inhalts-Plugin, das die Berechtigungen der ContentBuilder-NG-Ansichten auf die aus Datensätzen erzeugten Joomla-Artikel anwendet: Bei jeder Anzeige eines solchen Artikels (Frontend oder Backend) wird die VIEW-Berechtigung des aktuellen Benutzers für den verknüpften Datensatz geprüft; bei Verweigerung wird der Artikeltext durch eine „nicht erlaubt“-Meldung ersetzt (oder die Artikelansicht blockiert). Keine Tags und keine Konfiguration erforderlich."
PLG_CONTENT_CONTENTBUILDERNG_PERMISSION_OBSERVER="ContentBuilder NG Permission Observer"
