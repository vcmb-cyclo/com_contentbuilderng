PLG_CONTENT_CONTENTBUILDERNG_PERMISSION_OBSERVER_XML_DESCRIPTION="Plugin de contenu qui applique les permissions des vues ContentBuilder NG aux articles Joomla générés depuis des enregistrements : à chaque affichage d'un tel article (site ou administration), la permission VIEW de l'utilisateur courant sur l'enregistrement lié est vérifiée et, en cas de refus, le texte de l'article est remplacé par un message « non autorisé » (ou la vue de l'article est bloquée). Aucune balise ni configuration requise."
PLG_CONTENT_CONTENTBUILDERNG_PERMISSION_OBSERVER="ContentBuilder NG Permission Observer"
