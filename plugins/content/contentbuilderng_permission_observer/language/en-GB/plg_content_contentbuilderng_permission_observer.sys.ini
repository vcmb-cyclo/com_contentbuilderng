PLG_CONTENT_CONTENTBUILDERNG_PERMISSION_OBSERVER_XML_DESCRIPTION="Content plugin that enforces ContentBuilder NG view permissions on the Joomla articles generated from records: whenever such an article is displayed (frontend or backend), the current user's VIEW permission on the linked record is checked and, if denied, the article text is replaced by a 'not allowed' message (or the article view is blocked). No tag and no configuration required."
PLG_CONTENT_CONTENTBUILDERNG_PERMISSION_OBSERVER="ContentBuilder NG Permission Observer"
