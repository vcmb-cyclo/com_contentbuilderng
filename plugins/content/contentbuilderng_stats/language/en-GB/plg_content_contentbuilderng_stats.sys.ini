PLG_CONTENT_CONTENTBUILDERNG_STATS="ContentBuilder NG - Content - Stats"
PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Replaces CBStats tags in Joomla content. Allowed output values: total, table, form_name. Syntax: {CBStats id=ViewID output=total}, {CBStats id=ViewID output=form_name}, {CBStats id=ViewID field=FieldName output=table}, {CBStats id=ViewID filter[field]=FieldName filter[value]='150 km' output=total}. Filter values are exact matches; quote values containing spaces. debug=1 does not change a successful result; it displays errors during tests. The STATS permission is required. Example: {CBStats id=15 output=total filter[field]=Distance filter[value]='150 km'}."
