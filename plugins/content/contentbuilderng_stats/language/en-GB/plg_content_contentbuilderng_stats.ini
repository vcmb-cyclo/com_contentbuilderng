PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Replaces CBStats tags in Joomla content. Allowed output values: total, table, form_name. Syntax: {CBStats id=ViewID output=total}, {CBStats id=ViewID output=form_name}, {CBStats id=ViewID field=FieldName output=table}, {CBStats id=ViewID filter[field]=FieldName filter[value]='200 km* | 300 km*' output=total}. Leading and trailing spaces are ignored. * matches any character sequence; | means OR between alternatives. Quote values containing spaces. debug=1 does not change a successful result; it displays errors during tests. The STATS permission is required."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Value"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Total"
PLG_CONTENT_CONTENTBUILDERNG_STATS_UNAVAILABLE="Statistics unavailable"
