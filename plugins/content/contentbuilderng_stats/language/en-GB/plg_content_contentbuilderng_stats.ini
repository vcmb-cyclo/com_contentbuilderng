PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Content plugin that replaces {CBStats} tags in Joomla articles and other HTML content with statistics from a ContentBuilder NG view: total record count, form name, a value-count table, or the sum/min/max of a numeric field. Syntax: {CBStats id=ViewID output=total|table|form_name|sum|min|max}, optionally with field=FieldName and filter[field]=FieldName filter[value]='...'. Requires the STATS permission for the current user."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Value"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Total"
PLG_CONTENT_CONTENTBUILDERNG_STATS_UNAVAILABLE="Statistics unavailable"
PLG_CONTENT_CONTENTBUILDERNG_STATS_INVALID_REQUEST="Invalid statistics request."
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_LABEL="{CBStats} syntax reference"
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_TEXT="<p>Use <code>id=ViewID</code> to target a ContentBuilder NG view, then choose an <code>output</code> value (default: <code>total</code>):</p><ul><li><code>output=total</code> — number of matching records.</li><li><code>output=form_name</code> — title/name of the view.</li><li><code>output=table</code> — static HTML table of value/count pairs (requires <code>field=FieldName</code>).</li><li><code>output=sum</code>, <code>output=min</code>, <code>output=max</code> — sum, smallest and largest numeric value of that field; each returns 0 if any matching value is non-numeric (all three require <code>field=FieldName</code>).</li></ul><p><strong>Filtering:</strong> add <code>filter[field]=FieldName filter[value]='...'</code> to restrict the statistics to matching records. Leading and trailing spaces are ignored, <code>*</code> matches any character sequence and <code>|</code> separates alternatives, for example <code>filter[value]='200 km* | 300 km*'</code>; quote values containing spaces. As a shorthand, <code>field=FieldName value='...'</code> is treated as a filter when <code>filter[field]</code> is absent.</p><p><strong>Errors:</strong> an invalid <code>output</code> value returns 'Invalid statistics request.' (or the list of allowed values with <code>debug=1</code>); a denied STATS permission returns 'Statistics unavailable' (or a debug detail with <code>debug=1</code>); any other error (for example a missing <code>id</code>) returns 0 (or its detail with <code>debug=1</code>).</p><p><strong>Examples:</strong><br><code>{CBStats id=12 output=total}</code> — number of records in view 12.<br><code>{CBStats id=12 output=table field=City filter[field]=Country filter[value]='France | Belgium'}</code> — value/count table of the City field, restricted to records whose Country is France or Belgium.</p>"
