PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Content plugin that replaces {CBStats} tags in Joomla articles and other HTML content with statistics from a ContentBuilder NG view: total record count, form name, a value-count table, or the sum/min/max of a numeric field. Syntax: {CBStats id=ViewID output=total|table|form_name|sum|min|max}, optionally with field=FieldName and filter[field]=FieldName filter[value]='...'. Requires the STATS permission for the current user."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Value"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Total"
PLG_CONTENT_CONTENTBUILDERNG_STATS_UNAVAILABLE="Statistics unavailable"
PLG_CONTENT_CONTENTBUILDERNG_STATS_INVALID_REQUEST="Invalid statistics request."
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_LABEL="{CBStats} syntax reference"
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_TEXT="Use id=ViewID to target a ContentBuilder NG view. output=total returns the number of matching records; output=form_name returns the view's title/name; output=table returns a static HTML table of value/count pairs (requires field=FieldName); output=sum, output=min and output=max return the weighted sum, smallest and largest numeric value of that field, each returning 0 if any matching value is non-numeric (all three require field=FieldName). Add filter[field]=FieldName filter[value]='...' to restrict the statistics to matching records: leading and trailing spaces are ignored, * matches any character sequence, and | separates alternatives, for example filter[value]='200 km* | 300 km*'; quote values containing spaces. An invalid output value returns \"Invalid statistics request.\" (or the list of allowed values with debug=1); a denied STATS permission returns \"Statistics unavailable\" (or a debug detail with debug=1)."
