PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Plugin de contenu qui remplace les balises {CBStats} dans les articles Joomla et autre contenu HTML par des statistiques d'une vue ContentBuilder NG : nombre total d'enregistrements, nom du formulaire, tableau des valeurs, ou somme/minimum/maximum d'un champ numérique. Syntaxe : {CBStats id=IdVue output=total|table|form_name|sum|min|max}, avec en option field=NomDuChamp et filter[field]=NomDuChamp filter[value]='...'. Nécessite la permission STATS pour l'utilisateur courant."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Valeur"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Total"
PLG_CONTENT_CONTENTBUILDERNG_STATS_UNAVAILABLE="Statistiques non disponibles"
PLG_CONTENT_CONTENTBUILDERNG_STATS_INVALID_REQUEST="Requête de statistiques invalide."
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_LABEL="Référence de syntaxe {CBStats}"
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_TEXT="<p>Utilisez <code>id=IdVue</code> pour cibler une vue ContentBuilder NG, puis choisissez une valeur <code>output</code> (par défaut&nbsp;: <code>total</code>)&nbsp;:</p><ul><li><code>output=total</code> — nombre d'enregistrements correspondants.</li><li><code>output=form_name</code> — titre/nom de la vue.</li><li><code>output=table</code> — tableau HTML statique des paires valeur/nombre (nécessite <code>field=NomDuChamp</code>).</li><li><code>output=sum</code>, <code>output=min</code>, <code>output=max</code> — somme, plus petite et plus grande valeur numérique de ce champ&nbsp;; chacune retourne 0 si une valeur correspondante n'est pas numérique (les trois nécessitent <code>field=NomDuChamp</code>).</li></ul><p><strong>Filtrage&nbsp;:</strong> ajoutez <code>filter[field]=NomDuChamp filter[value]='...'</code> pour restreindre les statistiques aux enregistrements correspondants. Les espaces en début et fin sont ignorés, <code>*</code> correspond à une suite quelconque de caractères et <code>|</code> sépare les alternatives, par exemple <code>filter[value]='200 km* | 300 km*'</code>&nbsp;; mettez entre guillemets les valeurs contenant des espaces. En raccourci, <code>field=NomDuChamp value='...'</code> est traité comme un filtre lorsque <code>filter[field]</code> est absent.</p><p><strong>Erreurs&nbsp;:</strong> une valeur <code>output</code> invalide retourne «&nbsp;Requête de statistiques invalide.&nbsp;» (ou la liste des valeurs autorisées avec <code>debug=1</code>)&nbsp;; une permission STATS refusée retourne «&nbsp;Statistiques non disponibles&nbsp;» (ou un détail de débogage avec <code>debug=1</code>)&nbsp;; toute autre erreur (par exemple un <code>id</code> manquant) retourne 0 (ou son détail avec <code>debug=1</code>).</p><p><strong>Exemples&nbsp;:</strong><br><code>{CBStats id=12 output=total}</code> — nombre d'enregistrements de la vue 12.<br><code>{CBStats id=12 output=table field=Ville filter[field]=Pays filter[value]='France | Belgique'}</code> — tableau valeur/nombre du champ Ville, restreint aux enregistrements dont le champ Pays vaut France ou Belgique.</p>"
