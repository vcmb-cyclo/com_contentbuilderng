PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Remplace les balises CBStats dans les contenus Joomla. Valeurs output autorisées : total, table, form_name. Syntaxe : {CBStats id=ViewID output=total}, {CBStats id=ViewID output=form_name}, {CBStats id=ViewID field=NomDuChamp output=table}, {CBStats id=ViewID filter[field]=NomDuChamp filter[value]='150 km' output=total}. Les valeurs filtrées correspondent exactement ; mettez entre guillemets les valeurs contenant des espaces. debug=1 ne modifie pas un résultat correct ; il affiche les erreurs pendant les tests. La permission STATS est requise. Exemple : {CBStats id=15 output=total filter[field]=Distance filter[value]='150 km'}."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Valeur"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Total"
