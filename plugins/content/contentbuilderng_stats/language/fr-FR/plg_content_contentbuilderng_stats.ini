PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Plugin de contenu qui remplace les balises {CBStats} dans les articles Joomla et autre contenu HTML par des statistiques d'une vue ContentBuilder NG : nombre total d'enregistrements, nom du formulaire, tableau des valeurs, ou somme/minimum/maximum d'un champ numérique. Syntaxe : {CBStats id=IdVue output=total|table|form_name|sum|min|max}, avec en option field=NomDuChamp et filter[field]=NomDuChamp filter[value]='...'. Nécessite la permission STATS pour l'utilisateur courant."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Valeur"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Total"
PLG_CONTENT_CONTENTBUILDERNG_STATS_UNAVAILABLE="Statistiques non disponibles"
PLG_CONTENT_CONTENTBUILDERNG_STATS_INVALID_REQUEST="Requête de statistiques invalide."
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_LABEL="Référence de syntaxe {CBStats}"
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_TEXT="Utilisez id=IdVue pour cibler une vue ContentBuilder NG. output=total retourne le nombre d'enregistrements correspondants ; output=form_name retourne le titre/nom de la vue ; output=table retourne un tableau HTML statique des paires valeur/nombre (nécessite field=NomDuChamp) ; output=sum, output=min et output=max retournent la somme pondérée, la plus petite et la plus grande valeur numérique de ce champ, chacune retournant 0 si une valeur correspondante n'est pas numérique (les trois nécessitent field=NomDuChamp). Ajoutez filter[field]=NomDuChamp filter[value]='...' pour restreindre les statistiques aux enregistrements correspondants : les espaces en début et fin sont ignorés, * correspond à une suite quelconque de caractères, et | sépare les alternatives, par exemple filter[value]='200 km* | 300 km*' ; mettez entre guillemets les valeurs contenant des espaces. Une valeur output invalide retourne « Requête de statistiques invalide. » (ou la liste des valeurs autorisées avec debug=1) ; une permission STATS refusée retourne « Statistiques non disponibles » (ou un détail de débogage avec debug=1)."
