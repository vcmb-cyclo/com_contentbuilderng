PLG_CONTENT_CONTENTBUILDERNG_STATS="ContentBuilder NG - Stats"
PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Ersetzt CBStats-Tags in Joomla-Inhalten. Erlaubte output-Werte: total, table, form_name. Syntax: {CBStats id=ViewID output=total}, {CBStats id=ViewID output=form_name}, {CBStats id=ViewID field=Feldname output=table}, {CBStats id=ViewID filter[field]=Feldname filter[value]='200 km* | 300 km*' output=total}. Führende und nachgestellte Leerzeichen werden ignoriert. * steht für eine beliebige Zeichenfolge; | bedeutet ODER zwischen Alternativen. Werte mit Leerzeichen in Anführungszeichen setzen. debug=1 ändert ein erfolgreiches Ergebnis nicht; es zeigt Fehler beim Testen an. Die STATS-Berechtigung ist erforderlich."
