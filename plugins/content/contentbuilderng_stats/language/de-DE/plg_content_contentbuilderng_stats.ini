PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Inhalts-Plugin, das {CBStats}-Tags in Joomla-Artikeln und anderem HTML-Inhalt durch Statistiken einer ContentBuilder-NG-Ansicht ersetzt: Gesamtanzahl der Datensätze, Formularname, eine Werttabelle oder Summe/Minimum/Maximum eines numerischen Feldes. Syntax: {CBStats id=AnsichtID output=total|table|form_name|sum|min|max}, optional mit field=Feldname und filter[field]=Feldname filter[value]='...'. Erfordert die STATS-Berechtigung für den aktuellen Benutzer."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Wert"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Gesamt"
PLG_CONTENT_CONTENTBUILDERNG_STATS_UNAVAILABLE="Statistiken nicht verfügbar"
PLG_CONTENT_CONTENTBUILDERNG_STATS_INVALID_REQUEST="Ungültige Statistikanfrage."
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_LABEL="{CBStats}-Syntaxreferenz"
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_TEXT="Verwenden Sie id=AnsichtID, um eine ContentBuilder-NG-Ansicht anzusprechen. output=total liefert die Anzahl der übereinstimmenden Datensätze; output=form_name liefert den Titel/Namen der Ansicht; output=table liefert eine statische HTML-Tabelle mit Wert-/Anzahlpaaren (erfordert field=Feldname); output=sum, output=min und output=max liefern die gewichtete Summe, den kleinsten und den größten numerischen Wert dieses Feldes, jeweils 0, wenn ein übereinstimmender Wert nicht numerisch ist (alle drei erfordern field=Feldname). Fügen Sie filter[field]=Feldname filter[value]='...' hinzu, um die Statistiken auf übereinstimmende Datensätze zu beschränken: führende und nachgestellte Leerzeichen werden ignoriert, * steht für eine beliebige Zeichenfolge, und | trennt Alternativen, zum Beispiel filter[value]='200 km* | 300 km*'; Werte mit Leerzeichen in Anführungszeichen setzen. Ein ungültiger output-Wert liefert „Ungültige Statistikanfrage.“ (oder mit debug=1 die Liste der erlaubten Werte); eine verweigerte STATS-Berechtigung liefert „Statistiken nicht verfügbar“ (oder mit debug=1 ein Debug-Detail)."
