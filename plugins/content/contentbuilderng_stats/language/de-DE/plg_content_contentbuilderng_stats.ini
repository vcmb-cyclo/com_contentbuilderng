PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Inhalts-Plugin, das {CBStats}-Tags in Joomla-Artikeln und anderem HTML-Inhalt durch Statistiken einer ContentBuilder-NG-Ansicht ersetzt: Gesamtanzahl der Datensätze, Formularname, eine Werttabelle oder Summe/Minimum/Maximum eines numerischen Feldes. Syntax: {CBStats id=AnsichtID output=total|table|form_name|sum|min|max}, optional mit field=Feldname und filter[field]=Feldname filter[value]='...'. Erfordert die STATS-Berechtigung für den aktuellen Benutzer."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Wert"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Gesamt"
PLG_CONTENT_CONTENTBUILDERNG_STATS_UNAVAILABLE="Statistiken nicht verfügbar"
PLG_CONTENT_CONTENTBUILDERNG_STATS_INVALID_REQUEST="Ungültige Statistikanfrage."
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_LABEL="{CBStats}-Syntaxreferenz"
PLG_CONTENT_CONTENTBUILDERNG_STATS_HELP_TEXT="<p>Verwenden Sie <code>id=AnsichtID</code>, um eine ContentBuilder-NG-Ansicht anzusprechen, und wählen Sie dann einen <code>output</code>-Wert (Standard: <code>total</code>):</p><ul><li><code>output=total</code> — Anzahl der übereinstimmenden Datensätze.</li><li><code>output=form_name</code> — Titel/Name der Ansicht.</li><li><code>output=table</code> — statische HTML-Tabelle mit Wert-/Anzahlpaaren (erfordert <code>field=Feldname</code>).</li><li><code>output=sum</code>, <code>output=min</code>, <code>output=max</code> — Summe, kleinster und größter numerischer Wert dieses Feldes; jeweils 0, wenn ein übereinstimmender Wert nicht numerisch ist (alle drei erfordern <code>field=Feldname</code>).</li></ul><p><strong>Filterung:</strong> Fügen Sie <code>filter[field]=Feldname filter[value]='...'</code> hinzu, um die Statistiken auf übereinstimmende Datensätze zu beschränken. Führende und nachgestellte Leerzeichen werden ignoriert, <code>*</code> steht für eine beliebige Zeichenfolge und <code>|</code> trennt Alternativen, zum Beispiel <code>filter[value]='200 km* | 300 km*'</code>; Werte mit Leerzeichen in Anführungszeichen setzen. Als Kurzform wird <code>field=Feldname value='...'</code> als Filter behandelt, wenn <code>filter[field]</code> fehlt.</p><p><strong>Fehler:</strong> Ein ungültiger <code>output</code>-Wert liefert „Ungültige Statistikanfrage.“ (oder mit <code>debug=1</code> die Liste der erlaubten Werte); eine verweigerte STATS-Berechtigung liefert „Statistiken nicht verfügbar“ (oder mit <code>debug=1</code> ein Debug-Detail); jeder andere Fehler (zum Beispiel eine fehlende <code>id</code>) liefert 0 (oder mit <code>debug=1</code> das Fehlerdetail).</p><p><strong>Beispiele:</strong><br><code>{CBStats id=12 output=total}</code> — Anzahl der Datensätze der Ansicht 12.<br><code>{CBStats id=12 output=table field=Stadt filter[field]=Land filter[value]='Frankreich | Belgien'}</code> — Wert-/Anzahltabelle des Feldes Stadt, beschränkt auf Datensätze, deren Feld Land Frankreich oder Belgien ist.</p>"
