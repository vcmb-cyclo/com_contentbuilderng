PLG_CONTENT_CONTENTBUILDERNG_STATS_XML_DESCRIPTION="Ersetzt CBStats-Tags in Joomla-Inhalten. Syntax: {CBStats id=ViewID output=total}, {CBStats id=ViewID output=form_name}, {CBStats id=ViewID field=Feldname output=table}, {CBStats id=ViewID filter[field]=Feldname filter[value]='150 km' output=total}. Filterwerte werden exakt verglichen; Werte mit Leerzeichen in Anführungszeichen setzen. debug=1 ändert ein erfolgreiches Ergebnis nicht; es zeigt Fehler beim Testen an. Die STATS-Berechtigung ist erforderlich. Beispiel: {CBStats id=15 output=total filter[field]=Distanz filter[value]='150 km'}."
PLG_CONTENT_CONTENTBUILDERNG_STATS_VALUE="Wert"
PLG_CONTENT_CONTENTBUILDERNG_STATS_TOTAL="Gesamt"
