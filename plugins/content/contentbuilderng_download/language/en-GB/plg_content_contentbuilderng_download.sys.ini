PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD_XML_DESCRIPTION="Content plugin that replaces {CBDownload} tags in Joomla articles and ContentBuilder NG lists/details with download links for the files stored in an upload field of the linked record. Shows optional file information (filename, MIME type, size, download count), counts downloads once per session and checks the view's VIEW permission before serving files. Syntax: {CBDownload field:FieldName; option:value; ...}."
PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD="ContentBuilder NG - Content - Download"
