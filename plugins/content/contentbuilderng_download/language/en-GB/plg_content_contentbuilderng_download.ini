PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD_HELP_LABEL="{CBDownload} syntax reference"
PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD_HELP_TEXT="<p>Options are separated by <code>;</code> and written as <code>name:value</code>:</p><ul><li><code>field</code> — name of the upload field containing the file(s); in list context it defaults to the current list field.</li><li><code>info</code> — <code>true</code> (default) or <code>false</code>: show the information block under the link.</li><li><code>hide-filename</code>, <code>hide-mime</code>, <code>hide-size</code>, <code>hide-downloads</code> — <code>true</code> to hide the corresponding line of the information block.</li><li><code>box-style</code>, <code>info-style</code> — inline CSS for the box and the information block; separate declarations with <code>::</code> instead of <code>;</code>, for example <code>border-width:thin::padding:5px</code>.</li><li><code>align</code> — <code>left</code> or <code>right</code> to float the box; several files of one field are laid out side by side.</li></ul><p><strong>Behaviour:</strong> each file of the field produces one download box; downloads are counted once per session; the current user's VIEW permission on the view is checked, and a denied direct download request answers 'No Access'.</p><p><strong>Example:</strong> <code>{CBDownload field:Brochure; hide-mime:true; align:left}</code></p>"
