PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD_HELP_TEXT="<p>Les options sont séparées par <code>;</code> et s'écrivent <code>nom:valeur</code>&nbsp;:</p><ul><li><code>field</code> — nom du champ de téléversement contenant le ou les fichiers&nbsp;; en contexte de liste, il vaut par défaut le champ courant de la liste.</li><li><code>info</code> — <code>true</code> (par défaut) ou <code>false</code>&nbsp;: affiche le bloc d'informations sous le lien.</li><li><code>hide-filename</code>, <code>hide-mime</code>, <code>hide-size</code>, <code>hide-downloads</code> — <code>true</code> pour masquer la ligne correspondante du bloc d'informations.</li><li><code>box-style</code>, <code>info-style</code> — CSS en ligne pour le cadre et le bloc d'informations&nbsp;; séparez les déclarations par <code>::</code> au lieu de <code>;</code>, par exemple <code>border-width:thin::padding:5px</code>.</li><li><code>align</code> — <code>left</code> ou <code>right</code> pour faire flotter le cadre&nbsp;; plusieurs fichiers d'un même champ sont disposés côte à côte.</li></ul><p><strong>Comportement&nbsp;:</strong> chaque fichier du champ produit un cadre de téléchargement&nbsp;; les téléchargements sont comptabilisés une fois par session&nbsp;; la permission VIEW de l'utilisateur courant sur la vue est vérifiée, et une demande de téléchargement direct refusée répond «&nbsp;No Access&nbsp;».</p><p><strong>Exemple&nbsp;:</strong> <code>{CBDownload field:Brochure; hide-mime:true; align:left}</code></p>"
