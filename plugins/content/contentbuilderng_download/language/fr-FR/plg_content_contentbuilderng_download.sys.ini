PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD_XML_DESCRIPTION="Plugin de contenu qui remplace les balises {CBDownload} dans les articles Joomla et les listes/détails ContentBuilder NG par des liens de téléchargement pour les fichiers stockés dans un champ de téléversement de l'enregistrement lié. Affiche des informations optionnelles (nom de fichier, type MIME, taille, nombre de téléchargements), comptabilise les téléchargements une fois par session et vérifie la permission VIEW de la vue avant de servir les fichiers. Syntaxe : {CBDownload field:NomDuChamp; option:valeur; ...}."
PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD="ContentBuilder NG - Content - Download"
