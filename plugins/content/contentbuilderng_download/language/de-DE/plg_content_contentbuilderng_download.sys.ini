PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD_XML_DESCRIPTION="Inhalts-Plugin, das {CBDownload}-Tags in Joomla-Artikeln und ContentBuilder-NG-Listen/Detailansichten durch Download-Links für die in einem Upload-Feld des verknüpften Datensatzes gespeicherten Dateien ersetzt. Zeigt optionale Dateiinformationen (Dateiname, MIME-Typ, Größe, Anzahl der Downloads), zählt Downloads einmal pro Sitzung und prüft die VIEW-Berechtigung der Ansicht, bevor Dateien ausgeliefert werden. Syntax: {CBDownload field:Feldname; Option:Wert; ...}."
PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD="ContentBuilder NG - Content - Download"
