PLG_CONTENT_CONTENTBUILDERNG_DOWNLOAD_HELP_TEXT="<p>Optionen werden durch <code>;</code> getrennt und als <code>Name:Wert</code> geschrieben:</p><ul><li><code>field</code> — Name des Upload-Feldes mit der/den Datei(en); im Listenkontext standardmäßig das aktuelle Listenfeld.</li><li><code>info</code> — <code>true</code> (Standard) oder <code>false</code>: zeigt den Informationsblock unter dem Link.</li><li><code>hide-filename</code>, <code>hide-mime</code>, <code>hide-size</code>, <code>hide-downloads</code> — <code>true</code>, um die entsprechende Zeile des Informationsblocks auszublenden.</li><li><code>box-style</code>, <code>info-style</code> — Inline-CSS für den Rahmen und den Informationsblock; Deklarationen mit <code>::</code> statt <code>;</code> trennen, zum Beispiel <code>border-width:thin::padding:5px</code>.</li><li><code>align</code> — <code>left</code> oder <code>right</code>, um den Rahmen fließen zu lassen; mehrere Dateien eines Feldes werden nebeneinander angeordnet.</li></ul><p><strong>Verhalten:</strong> Jede Datei des Feldes erzeugt einen Download-Rahmen; Downloads werden einmal pro Sitzung gezählt; die VIEW-Berechtigung des aktuellen Benutzers für die Ansicht wird geprüft, und eine verweigerte direkte Download-Anfrage antwortet mit „No Access“.</p><p><strong>Beispiel:</strong> <code>{CBDownload field:Broschuere; hide-mime:true; align:left}</code></p>"