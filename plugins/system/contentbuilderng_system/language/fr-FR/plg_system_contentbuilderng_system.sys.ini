PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_XML_DESCRIPTION="Plugin système requis par ContentBuilder NG. Lors des actions d'enregistrement/publication, il synchronise les enregistrements avec leurs sources, crée ou met à jour les articles Joomla des vues avec génération d'articles activée, applique les dates de publication/dépublication programmées des enregistrements, et dépublie/republie le contenu des utilisateurs d'inscription bloqués ou débloqués. Côté site, il charge les ressources de thème du contenu ContentBuilder NG affiché et peut rediriger l'édition d'un article Joomla vers l'éditeur ContentBuilder NG. Options : désactiver la soumission d'articles native de Joomla, désactiver le cache de com_content pour que les plugins de contenu continuent de s'exécuter, et affecter ou retirer automatiquement des groupes d'utilisateurs Joomla selon les vérifications réussies."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM="ContentBuilder NG System"
