PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_LIMIT_PER_TURN_LABEL="Limite de synchronisation par passage"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_DISABLE_NEW_ARTICLES_LABEL="Désactiver la soumission d'articles native de Joomla"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_NOCACHE_LABEL="Désactiver le cache Joomla pour com_content"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_NOCACHE_DESC="ATTENTION&nbsp;: si vous choisissez Non, de nombreux plugins comme Image Scale ne fonctionneront plus, car Joomla n'appelle pas les plugins sur le contenu mis en cache."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_IS_AUTO_GROUPS_LABEL="Affectation automatique de groupes"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_IS_AUTO_GROUPS_DESC="Si une vérification réussit (vérification manuelle d'un utilisateur ou plugins comme paypal, passthrough, etc.), les utilisateurs sont automatiquement ajoutés aux groupes Joomla sélectionnés ci-dessous. N'activez ceci qu'une fois les réglages ci-dessous corrects, car les groupes sélectionnés seront ajoutés pour CHAQUE utilisateur vérifié. En cas de doute, limitez aux vues souhaitées ci-dessous."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LABEL="Sélectionner les groupes d'utilisateurs"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_DESC="Si l'affectation automatique de groupes est activée ci-dessus, tout utilisateur est ajouté aux groupes sélectionnés lorsqu'une vérification réussit. Lorsque la vérification n'est plus valide, les groupes sont automatiquement retirés aux utilisateurs."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LIMIT_VIEWS_LABEL="Limiter les groupes à des vues"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LIMIT_VIEWS_DESC="Liste d'identifiants de vues séparés par des virgules sur lesquelles l'affectation automatique de groupes s'applique. Si laissé vide, les groupes sont affectés à tous les utilisateurs vérifiés pour au moins une de vos vues."
