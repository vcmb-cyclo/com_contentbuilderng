PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_LIMIT_PER_TURN_LABEL="Synchronisierungslimit pro Durchlauf"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_DISABLE_NEW_ARTICLES_LABEL="Native Artikelübermittlung von Joomla deaktivieren"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_NOCACHE_LABEL="Joomla-Cache für com_content deaktivieren"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_NOCACHE_DESC="WARNUNG: Wenn Sie hier Nein wählen, funktionieren viele Plugins wie Image Scale nicht mehr, da Joomla Plugins bei zwischengespeichertem Inhalt nicht aufruft."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_IS_AUTO_GROUPS_LABEL="Automatische Gruppenzuweisung"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_IS_AUTO_GROUPS_DESC="Wenn eine Verifizierung erfolgreich ist (manuelle Benutzerverifizierung oder Plugins wie paypal, passthrough usw.), werden die Benutzer automatisch den unten ausgewählten Joomla-Gruppen hinzugefügt. Aktivieren Sie dies erst, wenn die untenstehenden Einstellungen korrekt sind, da die ausgewählten Gruppen für JEDEN verifizierten Benutzer hinzugefügt werden. Im Zweifel auf die gewünschten Ansichten unten beschränken."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LABEL="Benutzergruppen auswählen"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_DESC="Ist die automatische Gruppenzuweisung oben aktiviert, wird jeder Benutzer bei erfolgreicher Verifizierung den ausgewählten Gruppen hinzugefügt. Ist die Verifizierung nicht mehr gültig, werden die Gruppen den Benutzern automatisch wieder entzogen."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LIMIT_VIEWS_LABEL="Gruppen auf Ansichten beschränken"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LIMIT_VIEWS_DESC="Kommagetrennte Liste von Ansicht-IDs, auf denen die automatische Gruppenzuweisung angewendet wird. Bleibt das Feld leer, werden die Gruppen allen Benutzern zugewiesen, die für mindestens eine Ihrer Ansichten verifiziert sind."
