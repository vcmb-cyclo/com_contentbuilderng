PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_XML_DESCRIPTION="System-Plugin, das von ContentBuilder NG benötigt wird. Bei Speicher-/Veröffentlichungsaktionen synchronisiert es die Datensätze mit ihren Quellen, erstellt oder aktualisiert die Joomla-Artikel der Ansichten mit aktivierter Artikelerzeugung, wendet geplante Veröffentlichungs-/Depublizierungsdaten der Datensätze an und depubliziert/republiziert die Inhalte gesperrter bzw. entsperrter Registrierungsbenutzer. Im Frontend lädt es die Theme-Ressourcen des angezeigten ContentBuilder-NG-Inhalts und kann die Bearbeitung eines Joomla-Artikels zum ContentBuilder-NG-Editor umleiten. Optionen: die native Artikelübermittlung von Joomla deaktivieren, den com_content-Cache deaktivieren, damit Inhalts-Plugins weiterhin ausgeführt werden, und Joomla-Benutzergruppen anhand erfolgreicher Verifizierungen automatisch zuweisen oder entfernen."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM="ContentBuilder NG System"
