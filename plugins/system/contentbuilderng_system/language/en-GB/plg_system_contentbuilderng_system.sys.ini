PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_XML_DESCRIPTION="System plugin required by ContentBuilder NG. On save/publish actions it synchronises records with their sources, creates or updates the Joomla articles of views with article generation enabled, applies scheduled publish up/down dates of records, and unpublishes/republishes the content of blocked or unblocked registration users. On the frontend it loads the theme assets of displayed ContentBuilder NG content and can redirect Joomla article editing to the ContentBuilder NG editor. Options: disable Joomla's built-in article submission, disable the com_content cache so content plugins keep running, and automatically assign or remove Joomla user groups based on successful verifications."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM="ContentBuilder NG System"
