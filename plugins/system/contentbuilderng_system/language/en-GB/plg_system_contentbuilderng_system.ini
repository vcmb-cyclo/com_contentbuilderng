PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_LIMIT_PER_TURN_LABEL="Synchronisation limit per turn"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_DISABLE_NEW_ARTICLES_LABEL="Disable Joomla built-in article submission"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_NOCACHE_LABEL="Disable Joomla cache for com_content"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_NOCACHE_DESC="WARNING: If you set this to No, many plugins like Image Scale won't work anymore because Joomla does not call plugins with cached content."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_IS_AUTO_GROUPS_LABEL="Auto groups assignment"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_IS_AUTO_GROUPS_DESC="If a verification succeeds (manual user verification or plugins like paypal, passthrough, etc.), the users will be automatically added to the Joomla groups selected below. Activate this only once the settings below are correct, as the selected groups will be added for EVERY verified user. If you are not sure, limit to the desired views below."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LABEL="Select user groups"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_DESC="If auto groups assignment is enabled above, any user will be added to the selected groups when a verification succeeds. When the verification is no longer valid, the groups are automatically removed from the users."
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LIMIT_VIEWS_LABEL="Limit groups to views"
PLG_SYSTEM_CONTENTBUILDERNG_SYSTEM_FIELD_AUTO_GROUPS_LIMIT_VIEWS_DESC="Comma-separated list of view IDs on which auto groups operate. If left blank, the groups are assigned to all users that are verified for at least one of your views."
