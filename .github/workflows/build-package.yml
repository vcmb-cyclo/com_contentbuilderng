name: Build Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install production dependencies
        working-directory: administrator
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Resolve package version
        id: version
        run: |
          version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng.xml)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Assemble distribution
        run: |
          mkdir -p build/package
          cp -R administrator build/package/
          cp -R site build/package/
          cp -R media build/package/
          cp -R plugins build/package/
          cp com_contentbuilderng.xml build/package/
          cp script.php build/package/
          rm -rf build/package/administrator/vendor/bin

      - name: Create archive
        working-directory: build/package
        run: |
          zip -r "../com_contentbuilderng-${{ steps.version.outputs.version }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: com_contentbuilderng-${{ steps.version.outputs.version }}
          path: build/com_contentbuilderng-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "build/com_contentbuilderng-${{ steps.version.outputs.version }}.zip" \
            --title "ContentBuilder NG ${GITHUB_REF_NAME}" \
            --generate-notes
