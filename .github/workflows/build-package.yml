name: Test and Build Package

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - com_contentbuilderng_update.xml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: PHP, XML and translation checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: PHP syntax check
        run: |
          find . -type f -name '*.php' \
            -not -path './admin/vendor/*' \
            -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Validate XML files
        run: |
          find . -type f -name '*.xml' \
            -not -path './admin/vendor/*' \
            -print0 | xargs -0 xmllint --noout

      - name: Check version consistency
        run: |
          manifest_version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng.xml)"
          update_version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng_update.xml)"
          if [ "${manifest_version}" != "${update_version}" ]; then
            echo "::error::Version mismatch: manifest ${manifest_version} vs update stream ${update_version}."
            exit 1
          fi

      - name: Check translations
        run: python3 scripts/check-translations.py

      - name: Audit Composer dependencies
        working-directory: admin
        run: composer audit --locked --no-interaction

  css-lint:
    name: CSS checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - name: Install CSS lint dependencies
        run: npm ci

      - name: Lint CSS
        run: npm run lint:css

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: admin
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-8.3-${{ hashFiles('admin/composer.lock') }}
          restore-keys: composer-8.3-

      - name: Install dependencies
        working-directory: admin
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache extracted Joomla core stubs
        id: joomla-stubs-cache
        uses: actions/cache@v6
        with:
          path: joomla-stubs
          key: joomla-stubs-6.1.2-php8.3

      - name: Extract Joomla core for class discovery
        if: steps.joomla-stubs-cache.outputs.cache-hit != 'true'
        run: |
          container="$(docker create joomla:6.1.2-php8.3-apache)"
          mkdir -p joomla-stubs
          docker cp "${container}:/usr/src/joomla/libraries" joomla-stubs/libraries
          docker rm "${container}"

      - name: Run PHPStan
        run: admin/vendor/bin/phpstan analyse -c phpstan.neon.dist --no-progress --error-format=github

  unit-tests:
    name: Unit tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP 8.3 with coverage
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: admin
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-8.3-${{ hashFiles('admin/composer.lock') }}
          restore-keys: composer-8.3-

      - name: Install test dependencies
        working-directory: admin
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run unit tests and generate coverage reports
        working-directory: admin
        run: |
          vendor/bin/phpunit \
            --coverage-clover=coverage/clover.xml \
            --coverage-html=coverage/html \
            --coverage-text

      - name: Enforce coverage threshold
        run: php scripts/check-coverage.php admin/coverage/clover.xml 1

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: phpunit-coverage
          path: admin/coverage
          retention-days: 14

  package:
    name: Build and smoke-test package
    needs: [lint, css-lint, unit-tests, phpstan]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: admin
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-8.3-${{ hashFiles('admin/composer.lock') }}
          restore-keys: composer-8.3-

      - name: Set package creation date
        run: |
          creation_date="$(TZ=Europe/Paris date +%F)"
          build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          perl -0pi -e "s#<creationDate>.*?</creationDate>#<creationDate>${creation_date}</creationDate>#" com_contentbuilderng.xml
          perl -0pi -e "s#\\n\\s*<buildType>.*?</buildType>##g; s#(<creationDate>.*?</creationDate>)#\$1\n    <buildType>production</buildType>#" com_contentbuilderng.xml
          perl -0pi -e "s#\\n\\s*<buildTimestamp>.*?</buildTimestamp>##g; s#(<buildType>.*?</buildType>)#\$1\n    <buildTimestamp>${build_timestamp}</buildTimestamp>#" com_contentbuilderng.xml

      - name: Build production package
        id: package
        run: echo "archive=$(scripts/build-package.sh)" >> "$GITHUB_OUTPUT"

      - name: Validate package contents
        run: scripts/validate-package.sh "${{ steps.package.outputs.archive }}"

      - name: Test installation, update and migration on Joomla
        run: scripts/joomla-install-smoke.sh "${{ steps.package.outputs.archive }}"

      - name: Upload installation package
        uses: actions/upload-artifact@v7
        with:
          name: installation-package
          path: ${{ steps.package.outputs.archive }}
          retention-days: 14

  release:
    name: Publish release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download installation package
        uses: actions/download-artifact@v8
        with:
          name: installation-package
          path: build

      - name: Resolve release metadata
        id: release
        run: |
          version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng.xml)"
          archive="build/com_contentbuilderng-${version}.zip"
          test -f "${archive}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          if tagged_sha="$(git rev-list -n 1 "v${version}" 2>/dev/null)" && [ "${tagged_sha}" != "${GITHUB_SHA}" ]; then
            echo "::notice::Version v${version} is already published from ${tagged_sha}; skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate package checksum
        if: steps.release.outputs.publish == 'true'
        id: checksum
        run: |
          sha256="$(sha256sum "${{ steps.release.outputs.archive }}" | awk '{print $1}')"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: steps.release.outputs.publish == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          archive="${{ steps.release.outputs.archive }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${archive}" --clobber
          else
            gh release create "${tag}" \
              "${archive}" \
              --target "${GITHUB_SHA}" \
              --title "ContentBuilder NG ${tag}" \
              --generate-notes
          fi

      - name: Publish update checksum to main
        if: steps.release.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          current_version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng_update.xml)"
          if [ "${current_version}" != "${{ steps.release.outputs.version }}" ]; then
            echo "Update manifest version ${current_version} does not match package version ${{ steps.release.outputs.version }}." >&2
            exit 1
          fi
          perl -0pi -e 's#\n\s*<sha256>.*?</sha256>##g; s#(\n\s*</downloads>)#\n\t\t<sha256>${{ steps.checksum.outputs.sha256 }}</sha256>$1#' com_contentbuilderng_update.xml
          if git diff --quiet -- com_contentbuilderng_update.xml; then
            echo "Update checksum already current."
            exit 0
          fi
          git add com_contentbuilderng_update.xml
          git commit -m "Update package checksum for ${{ steps.release.outputs.version }}"
          git push origin main
