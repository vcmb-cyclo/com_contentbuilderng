name: Test and Build Package

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP with coverage
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: pcov

      - name: Install test dependencies
        working-directory: admin
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run unit tests and measure coverage
        working-directory: admin
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --coverage-text

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: phpunit-coverage
          path: admin/coverage.xml

  package:
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Resolve package version
        id: version
        run: |
          version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng.xml)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set package creation date
        run: |
          creation_date="$(TZ=Europe/Paris date +%F)"
          build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          perl -0pi -e "s#<creationDate>.*?</creationDate>#<creationDate>${creation_date}</creationDate>#" com_contentbuilderng.xml
          perl -0pi -e "s#\\n\\s*<buildType>.*?</buildType>##g; s#(<creationDate>.*?</creationDate>)#\$1\n    <buildType>production</buildType>#" com_contentbuilderng.xml
          perl -0pi -e "s#\\n\\s*<buildTimestamp>.*?</buildTimestamp>##g; s#(<buildType>.*?</buildType>)#\$1\n    <buildTimestamp>${build_timestamp}</buildTimestamp>#" com_contentbuilderng.xml

      - name: Build production package
        id: package
        run: echo "archive=$(scripts/build-package.sh)" >> "$GITHUB_OUTPUT"

      - name: Validate package contents
        run: scripts/validate-package.sh "${{ steps.package.outputs.archive }}"

      - name: Test installation, update and migration on Joomla
        run: scripts/joomla-install-smoke.sh "${{ steps.package.outputs.archive }}"

      - name: Upload installation package
        uses: actions/upload-artifact@v7
        with:
          name: com_contentbuilderng-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.archive }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.package.outputs.archive }}" \
            --title "ContentBuilder NG ${GITHUB_REF_NAME}" \
            --generate-notes
