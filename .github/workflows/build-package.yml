name: Test and Build Package

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP 8.1 (minimum supported version)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: PHP syntax check
        run: |
          find . -type f -name '*.php' \
            -not -path './admin/vendor/*' \
            -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Validate XML files
        run: |
          find . -type f -name '*.xml' \
            -not -path './admin/vendor/*' \
            -print0 | xargs -0 xmllint --noout

      - name: Check version consistency
        run: |
          manifest_version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng.xml)"
          update_version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng_update.xml)"
          if [ "${manifest_version}" != "${update_version}" ]; then
            echo "::error::Version mismatch: manifest ${manifest_version} vs update stream ${update_version}."
            exit 1
          fi

      - name: Check translations
        run: python3 scripts/check-translations.py

      - name: Audit composer dependencies
        working-directory: admin
        run: composer audit --locked --no-interaction

  phpstan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        working-directory: admin
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Extract Joomla core for class discovery
        run: |
          container="$(docker create joomla:6.0-apache)"
          mkdir -p joomla-stubs
          docker cp "${container}:/usr/src/joomla/libraries" joomla-stubs/libraries
          docker rm "${container}"

      - name: Run PHPStan
        run: admin/vendor/bin/phpstan analyse -c phpstan.neon.dist --no-progress --error-format=github

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP with coverage
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: pcov

      - name: Install test dependencies
        working-directory: admin
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run unit tests and measure coverage
        working-directory: admin
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --coverage-text

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: phpunit-coverage
          path: admin/coverage.xml

  package:
    needs: [lint, unit-tests, phpstan]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Resolve package version
        id: version
        run: |
          version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng.xml)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Tag release version
        if: github.ref == 'refs/heads/main'
        env:
          # GITHUB_TOKEN ne peut pas être utilisé ici : un push effectué avec
          # ce jeton par défaut ne déclenche jamais de nouveau workflow run
          # (protection anti-boucle de GitHub Actions), donc le tag serait
          # créé mais le run "push tag" qui publie la release ne démarrerait
          # jamais. RELEASE_TAG_PAT doit être un PAT (scope repo / contents)
          # stocké en secret du dépôt.
          RELEASE_TAG_PAT: ${{ secrets.RELEASE_TAG_PAT }}
        run: |
          if [ -z "${RELEASE_TAG_PAT}" ]; then
            echo "::warning::RELEASE_TAG_PAT secret is not set - skipping automatic release tagging. See workflow comments for setup."
            exit 0
          fi

          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists, skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push "https://x-access-token:${RELEASE_TAG_PAT}@github.com/${GITHUB_REPOSITORY}.git" "${tag}"
          fi

      - name: Set package creation date
        run: |
          creation_date="$(TZ=Europe/Paris date +%F)"
          build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          perl -0pi -e "s#<creationDate>.*?</creationDate>#<creationDate>${creation_date}</creationDate>#" com_contentbuilderng.xml
          perl -0pi -e "s#\\n\\s*<buildType>.*?</buildType>##g; s#(<creationDate>.*?</creationDate>)#\$1\n    <buildType>production</buildType>#" com_contentbuilderng.xml
          perl -0pi -e "s#\\n\\s*<buildTimestamp>.*?</buildTimestamp>##g; s#(<buildType>.*?</buildType>)#\$1\n    <buildTimestamp>${build_timestamp}</buildTimestamp>#" com_contentbuilderng.xml

      - name: Build production package
        id: package
        run: echo "archive=$(scripts/build-package.sh)" >> "$GITHUB_OUTPUT"

      - name: Calculate package checksum
        id: checksum
        run: |
          sha256="$(sha256sum "${{ steps.package.outputs.archive }}" | awk '{print $1}')"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Validate package contents
        run: scripts/validate-package.sh "${{ steps.package.outputs.archive }}"

      - name: Test installation, update and migration on Joomla
        run: scripts/joomla-install-smoke.sh "${{ steps.package.outputs.archive }}"

      - name: Upload installation package
        uses: actions/upload-artifact@v7
        with:
          name: com_contentbuilderng-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.archive }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.package.outputs.archive }}" \
            --title "ContentBuilder NG ${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Publish update checksum to main
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main:refs/heads/main
          git switch main
          current_version="$(grep -oPm1 '(?<=<version>)[^<]+' com_contentbuilderng_update.xml)"
          if [ "${current_version}" != "${{ steps.version.outputs.version }}" ]; then
            echo "Update manifest version ${current_version} does not match package version ${{ steps.version.outputs.version }}." >&2
            exit 1
          fi
          perl -0pi -e 's#\n\s*<sha256>.*?</sha256>##g; s#(\n\s*</downloads>)#\n\t\t<sha256>${{ steps.checksum.outputs.sha256 }}</sha256>$1#' com_contentbuilderng_update.xml
          if git diff --quiet -- com_contentbuilderng_update.xml; then
            echo "Update checksum already current."
            exit 0
          fi
          git add com_contentbuilderng_update.xml
          git commit -m "Update package checksum for ${{ steps.version.outputs.version }}"
          git push origin main
